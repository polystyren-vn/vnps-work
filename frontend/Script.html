<script>
  const state = {
    // V0.9: deviceId trên URL chỉ dùng để cảnh báo link cũ. Đăng nhập thực tế dùng DeviceID + DeviceToken lưu riêng trong trình duyệt.
    linkDeviceId: window.__DEVICE_ID__ || '',
    deviceId: '',
    deviceToken: '',
    context: null,
    version: '',
    jobs: [],
    employees: [],
    entries: [],
    dailyStatus: null,
    dailySummary: null,
    dashboard: null,
    pendingDevices: [],
    editEmployees: [],
    editingEntry: null,
    leaveEmployees: [],
    employeeLeaves: [],
    busyCount: 0,
    busyStartedAt: 0,
    busyTimer: null,
    busyLabel: '',
    busyDisabledButtons: []
  };

  function todayText() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }

  const DEVICE_AUTH_KEY = 'VNPS_WORK_ASSIGN_DEVICE_AUTH_V1';

  function randomPart(length) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    if (window.crypto && window.crypto.getRandomValues) {
      const arr = new Uint32Array(length);
      window.crypto.getRandomValues(arr);
      for (let i = 0; i < length; i++) out += chars[arr[i] % chars.length];
      return out;
    }
    for (let i = 0; i < length; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  function createBrowserAuth() {
    const d = new Date();
    const datePart = d.toISOString().slice(0, 10).replace(/-/g, '');
    return {
      deviceId: 'DEV_' + datePart + '_' + randomPart(8),
      deviceToken: randomPart(32),
      createdAt: new Date().toISOString()
    };
  }

  function loadBrowserAuth() {
    try {
      const raw = localStorage.getItem(DEVICE_AUTH_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.deviceId || !parsed.deviceToken) return null;
      return parsed;
    } catch (err) {
      return null;
    }
  }

  function saveBrowserAuth(auth) {
    localStorage.setItem(DEVICE_AUTH_KEY, JSON.stringify(auth));
  }

  function getOrCreateBrowserAuth() {
    let auth = loadBrowserAuth();
    if (!auth) {
      auth = createBrowserAuth();
      saveBrowserAuth(auth);
    }
    return auth;
  }

  function resetBrowserDevice() {
    if (!confirm('Đăng ký lại thiết bị trên trình duyệt này? Thiết bị hiện tại sẽ mất quyền trên trình duyệt này và phải chờ QL duyệt lại.')) return;
    localStorage.removeItem(DEVICE_AUTH_KEY);
    location.href = location.origin + location.pathname;
  }

  function authPayload(extra) {
    return Object.assign({
      deviceId: state.deviceId,
      deviceToken: state.deviceToken
    }, extra || {});
  }

  function setMessage(text, ok) {
    const el = document.getElementById('message');
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function setRegisterMessage(text, type) {
    const el = document.getElementById('registerMessage');
    el.textContent = text || '';
    el.className = type || 'error';
  }

  function setReportMessage(text, ok) {
    const el = document.getElementById('reportMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function setDashboardMessage(text, ok) {
    const el = document.getElementById('dashboardMessage');
    if (!el) return;
    if (!text) {
      el.textContent = '';
      el.className = 'message-line';
      return;
    }
    el.textContent = text;
    el.className = ok ? 'ok' : 'error';
  }

  function setDailyMessage(text, ok) {
    const el = document.getElementById('dailyMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function setManageMessage(text, ok) {
    const el = document.getElementById('manageMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function setLeaveMessage(text, ok) {
    const el = document.getElementById('leaveMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function setEditMessage(text, ok) {
    const el = document.getElementById('editMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function updateBusyOverlay() {
    const overlay = document.getElementById('busyOverlay');
    if (!overlay || !state.busyStartedAt) return;
    const textEl = document.getElementById('busyText');
    const secEl = document.getElementById('busySeconds');
    const seconds = Math.max(0, Math.floor((Date.now() - state.busyStartedAt) / 1000));
    if (textEl) textEl.textContent = state.busyLabel || 'Đang thực hiện...';
    if (secEl) secEl.textContent = seconds + ' giây';
  }

  function beginBusy(label) {
    state.busyCount = Number(state.busyCount || 0) + 1;
    state.busyLabel = label || 'Đang thực hiện...';

    if (state.busyCount === 1) {
      state.busyStartedAt = Date.now();
      state.busyDisabledButtons = Array.from(document.querySelectorAll('button')).map(btn => ({
        btn,
        disabled: btn.disabled
      }));
      state.busyDisabledButtons.forEach(item => {
        if (!item.disabled) item.btn.disabled = true;
      });

      const overlay = document.getElementById('busyOverlay');
      if (overlay) overlay.classList.remove('hidden');
      document.body.classList.add('is-busy');
      updateBusyOverlay();
      state.busyTimer = setInterval(updateBusyOverlay, 1000);
    } else {
      updateBusyOverlay();
    }

    let closed = false;
    return function endBusy() {
      if (closed) return;
      closed = true;
      state.busyCount = Math.max(0, Number(state.busyCount || 0) - 1);
      if (state.busyCount > 0) return;

      if (state.busyTimer) clearInterval(state.busyTimer);
      state.busyTimer = null;
      state.busyStartedAt = 0;
      state.busyLabel = '';

      (state.busyDisabledButtons || []).forEach(item => {
        if (item.btn && document.contains(item.btn)) item.btn.disabled = item.disabled;
      });
      state.busyDisabledButtons = [];

      const overlay = document.getElementById('busyOverlay');
      if (overlay) overlay.classList.add('hidden');
      document.body.classList.remove('is-busy');
    };
  }


  function hideAllAreas() {
    ['blocked', 'registerArea', 'pendingArea', 'formArea'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    });
  }

  function setSectionCollapsed(sectionId, collapsed) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    section.classList.toggle('collapsed', !!collapsed);
    const stateLabel = section.querySelector('.section-state');
    if (stateLabel) stateLabel.textContent = collapsed ? 'Mở' : 'Thu gọn';
  }

  function toggleSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    setSectionCollapsed(sectionId, !section.classList.contains('collapsed'));
  }

  function resetMobileSections() {
    setSectionCollapsed('dashboardBox', false);
    setSectionCollapsed('deviceApproveBox', true);
    setSectionCollapsed('workSection', false);
    setSectionCollapsed('leaveBox', true);
    setSectionCollapsed('manageBox', true);
    setSectionCollapsed('dailyBox', true);
    setSectionCollapsed('reportBox', true);
  }

  function init() {
    document.getElementById('ngay').value = todayText();

    const auth = getOrCreateBrowserAuth();
    state.deviceId = auth.deviceId;
    state.deviceToken = auth.deviceToken;

    const doneBusy = beginBusy('Đang kiểm tra thiết bị...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          handleInitBlocked(res);
          return;
        }
        state.context = res.context;
        state.version = res.version || '';
        state.jobs = res.jobs || [];
        state.employees = res.employees || [];
        renderForm();
      })
      .withFailureHandler(err => {
        doneBusy();
        showBlocked(err.message);
      })
      .apiInit(authPayload({ ngay: document.getElementById('ngay').value }));
  }

  function handleInitBlocked(res) {
    if (res.canRegister || res.code === 'DEVICE_NOT_REGISTERED') {
      showRegisterDevice(res.deviceId || state.deviceId, res.reason);
      return;
    }

    if (res.code === 'DEVICE_PENDING') {
      showPending(res.reason);
      return;
    }

    showBlocked(res.reason);
  }

  function showBlocked(reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Bị chặn truy cập';
    document.getElementById('blockedReason').textContent = reason || 'Không rõ lý do.';
    document.getElementById('blocked').classList.remove('hidden');
  }

  function showRegisterDevice(deviceId, reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Thiết bị chưa đăng ký';
    document.getElementById('regDeviceId').value = deviceId || state.deviceId;
    const legacyHint = state.linkDeviceId ? ' Link có deviceId cũ chỉ dùng để tham khảo; quyền đăng nhập sẽ gắn với trình duyệt hiện tại.' : '';
    setRegisterMessage((reason || 'Vui lòng gửi thông tin đăng ký thiết bị.') + legacyHint, 'warn');
    document.getElementById('registerArea').classList.remove('hidden');
  }

  function showPending(reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Chờ duyệt thiết bị';
    document.getElementById('pendingReason').textContent = reason || 'Thiết bị đang chờ duyệt.';
    document.getElementById('pendingArea').classList.remove('hidden');
  }

  function submitDeviceRegister() {
    const payload = {
      deviceId: document.getElementById('regDeviceId').value,
      deviceToken: state.deviceToken,
      tenThietBi: document.getElementById('regTenThietBi').value,
      soTheDangKy: document.getElementById('regSoThe').value,
      ghiChu: document.getElementById('regGhiChu').value
    };

    if (!payload.tenThietBi.trim()) {
      setRegisterMessage('Vui lòng nhập tên thiết bị.', 'error');
      return;
    }
    if (!payload.soTheDangKy.trim()) {
      setRegisterMessage('Vui lòng nhập số thẻ đăng ký.', 'error');
      return;
    }

    setRegisterMessage('Đang gửi đăng ký thiết bị...', 'ok');
    const doneBusy = beginBusy('Đang gửi đăng ký thiết bị...');

    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setRegisterMessage(res.reason || 'Không đăng ký được thiết bị.', 'error');
          return;
        }
        showPending(res.reason || 'Đã gửi đăng ký thiết bị. Vui lòng chờ duyệt.');
      })
      .withFailureHandler(err => {
        doneBusy();
        setRegisterMessage(err.message, 'error');
      })
      .apiRegisterDevice(payload);
  }

  function renderForm() {
    hideAllAreas();
    document.getElementById('status').textContent = 'Thiết bị hợp lệ';
    document.getElementById('formArea').classList.remove('hidden');
    resetMobileSections();
    document.getElementById('userInfo').innerHTML = `
      <div class="identity-title">${escapeHtml(state.context.soThe)} - ${escapeHtml(state.context.hoTen)}</div>
      <div class="identity-grid">
        <span class="identity-chip"><span class="chip-label">Thiết bị</span><span class="chip-value">${escapeHtml(state.context.deviceId)}</span></span>
        <span class="identity-chip"><span class="chip-label">Quyền</span><span class="chip-value">${escapeHtml(state.context.viTri)}</span></span>
        <span class="identity-chip"><span class="chip-label">Trạng thái</span><span class="chip-value">Hoạt động</span></span>
        <span class="identity-chip"><span class="chip-label">Version</span><span class="chip-value">${escapeHtml(state.version || '')}</span></span>
      </div>
    `;

    const dashboardBox = document.getElementById('dashboardBox');
    if (dashboardBox) {
      dashboardBox.classList.toggle('hidden', !state.context.isQL);
      document.getElementById('dashboardDate').value = document.getElementById('ngay').value || todayText();
      renderManagerDashboard(null);
      if (state.context.isQL) loadManagerDashboard(true);
    }

    const deviceApproveBox = document.getElementById('deviceApproveBox');
    if (deviceApproveBox) {
      deviceApproveBox.classList.toggle('hidden', !state.context.isQL);
      renderPendingDevices();
    }

    const leaveBox = document.getElementById('leaveBox');
    if (leaveBox) {
      leaveBox.classList.toggle('hidden', !state.context.isQL);
      const leaveDateInput = document.getElementById('leaveDate');
      leaveDateInput.value = document.getElementById('ngay').value || todayText();
      leaveDateInput.onchange = () => loadEmployeeLeaveInfo(false);
      renderEmployeeLeaveInfo(null);
      if (state.context.isQL) loadEmployeeLeaveInfo(true);
    }

    const reportBox = document.getElementById('reportBox');
    if (reportBox) {
      reportBox.classList.toggle('hidden', !state.context.isQL);
      document.getElementById('reportFromDate').value = document.getElementById('ngay').value || todayText();
      document.getElementById('reportToDate').value = document.getElementById('ngay').value || todayText();
    }

    const manageBox = document.getElementById('manageBox');
    if (manageBox) {
      manageBox.classList.toggle('hidden', !state.context.isQL);
      document.getElementById('manageDate').value = document.getElementById('ngay').value || todayText();
    }

    const dailyBox = document.getElementById('dailyBox');
    if (dailyBox) {
      dailyBox.classList.toggle('hidden', !state.context.isQL);
      document.getElementById('dailyDate').value = document.getElementById('ngay').value || todayText();
      renderDailySummary(null);
    }

    const jobSelect = document.getElementById('maCongViec');
    jobSelect.innerHTML = '<option value="">-- Chọn hạng mục --</option>';
    state.jobs.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j.maCongViec;
      opt.textContent = `${j.maCongViec} · ${j.hangMuc}`;
      jobSelect.appendChild(opt);
    });
    jobSelect.onchange = () => {
      document.getElementById('newJobBox').classList.toggle(
        'hidden',
        jobSelect.value !== window.__ADD_NEW_JOB_VALUE__
      );
    };

    document.getElementById('ngay').onchange = onWorkDateChange;
    document.getElementById('employeeRows').innerHTML = '';
    addEmployeeRow();
  }

  function onWorkDateChange() {
    const workDate = document.getElementById('ngay').value || todayText();
    const dashboardDate = document.getElementById('dashboardDate');
    if (dashboardDate && state.context && state.context.isQL) dashboardDate.value = workDate;
    const leaveDate = document.getElementById('leaveDate');
    if (leaveDate && state.context && state.context.isQL) leaveDate.value = workDate;
    reloadEmployees();
    if (state.context && state.context.isQL) {
      loadEmployeeLeaveInfo(true);
      loadManagerDashboard(true);
    }
  }

  function reloadEmployees(silent) {
    const doneBusy = silent ? null : beginBusy('Đang tải danh sách nhân viên...');
    google.script.run
      .withSuccessHandler(res => {
        if (doneBusy) doneBusy();
        if (!res.ok) {
          setMessage(res.reason, false);
          return;
        }
        state.employees = res.employees || [];
        document.getElementById('employeeRows').innerHTML = '';
        addEmployeeRow();
      })
      .withFailureHandler(err => {
        if (doneBusy) doneBusy();
        setMessage(err.message, false);
      })
      .apiGetAvailableEmployees(authPayload({ ngay: document.getElementById('ngay').value }));
  }

  function buildEmployeeOptions() {
    return '<option value="">-- Số thẻ --</option>' + state.employees.map(e =>
      `<option value="${e.soThe}" data-conlai="${e.conLai}">${e.soThe}${e.hoTen ? ' · ' + escapeHtml(e.hoTen) : ''} · còn ${e.conLai}h${Number(e.gioNghi || 0) > 0 ? ' · nghỉ ' + e.gioNghi + 'h' : ''}</option>`
    ).join('');
  }

  function buildHourOptions(max) {
    let html = '<option value="">Giờ</option>';
    const limit = Math.max(1, Math.min(Number(max || 8), 8));
    for (let i = 1; i <= limit; i++) html += `<option value="${i}">${i}h</option>`;
    return html;
  }

  function addEmployeeRow() {
    const wrap = document.getElementById('employeeRows');
    const row = document.createElement('div');
    row.className = 'emp-row';
    row.innerHTML = `
      <select class="emp" name="soThe">${buildEmployeeOptions()}</select>
      <select class="hours" name="soGio">${buildHourOptions(8)}</select>
      <button type="button">×</button>
    `;
    const emp = row.querySelector('.emp');
    const hours = row.querySelector('.hours');
    emp.onchange = () => {
      const opt = emp.options[emp.selectedIndex];
      const max = Number(opt.dataset.conlai || 8);
      hours.innerHTML = buildHourOptions(max);
    };
    row.querySelector('button').onclick = () => row.remove();
    wrap.appendChild(row);
  }

  function collectPayload() {
    const rows = Array.from(document.querySelectorAll('#employeeRows .emp-row'));
    const nhanSu = [];
    const seen = {};

    rows.forEach(row => {
      const soThe = row.querySelector('select[name="soThe"]').value;
      const soGio = Number(row.querySelector('select[name="soGio"]').value);
      if (!soThe && !soGio) return;
      if (!soThe || !soGio) {
        throw new Error('Có dòng nhân viên chưa chọn đủ số thẻ và số giờ.');
      }
      if (seen[soThe]) {
        throw new Error(`Số thẻ ${soThe} bị chọn trùng trong cùng phiếu. Hãy gộp giờ vào một dòng.`);
      }
      seen[soThe] = true;
      nhanSu.push({ soThe, soGio });
    });

    if (!nhanSu.length) {
      throw new Error('Chưa chọn nhân viên tham gia.');
    }

    return {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('ngay').value,
      maCongViec: document.getElementById('maCongViec').value,
      hangMucMoi: document.getElementById('hangMucMoi').value,
      noiDungCongViec: document.getElementById('noiDungCongViec').value,
      nhanSu,
      // V0.1.1/V0.2: gửi thêm JSON dự phòng để backend luôn nhận đủ nhiều nhân viên.
      nhanSuJson: JSON.stringify(nhanSu)
    };
  }

  function saveForm() {
    let payload;
    try {
      payload = collectPayload();
    } catch (err) {
      setMessage(err.message, false);
      return;
    }

    setMessage(`Đang lưu ${payload.nhanSu.length} nhân viên...`, true);
    const doneBusy = beginBusy('Đang lưu công việc...');

    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        setMessage(`Đã lưu: ${res.phieuId} · ${res.soDongNhanSu} nhân viên`, true);
        document.getElementById('noiDungCongViec').value = '';
        document.getElementById('hangMucMoi').value = '';
        reloadEmployees(true);
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setMessage(err.message, false);
      })
      .apiSaveWorkEntry(payload);
  }



  function loadPendingDevices() {
    if (!state.context || !state.context.isQL) {
      setDeviceApproveMessage('Chỉ QL được duyệt thiết bị.', false);
      return;
    }
    setSectionCollapsed('deviceApproveBox', false);
    setDeviceApproveMessage('Đang tải thiết bị chờ duyệt...', true);
    const doneBusy = beginBusy('Đang tải thiết bị chờ duyệt...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setDeviceApproveMessage(res.reason || 'Không tải được danh sách thiết bị.', false);
          return;
        }
        state.pendingDevices = res.devices || [];
        renderPendingDevices();
        setDeviceApproveMessage('Đã tải ' + state.pendingDevices.length + ' thiết bị chờ duyệt.', true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setDeviceApproveMessage(err.message, false);
      })
      .apiListPendingDevices(authPayload());
  }

  function setDeviceApproveMessage(text, ok) {
    const el = document.getElementById('deviceApproveMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }

  function renderPendingDevices() {
    const box = document.getElementById('pendingDeviceList');
    if (!box) return;
    if (!state.pendingDevices || !state.pendingDevices.length) {
      box.innerHTML = '<p class="empty-note">Không có thiết bị nào đang chờ duyệt.</p>';
      return;
    }
    box.innerHTML = state.pendingDevices.map((d, idx) => `
      <div class="device-card">
        <div class="entry-head">
          <span>${escapeHtml(d.deviceId)}</span>
          <span>CHỜ DUYỆT</span>
        </div>
        <div class="entry-meta">
          <b>${escapeHtml(d.tenThietBi || '')}</b><br>
          Số thẻ đăng ký: ${escapeHtml(d.soTheDangKy || '')}<br>
          Ngày đăng ký: ${escapeHtml(d.ngayDangKy || '')}<br>
          Cập nhật: ${escapeHtml(d.dangKyCuoi || '')}<br>
          Ghi chú: ${escapeHtml(d.ghiChu || '')}
        </div>
        <label>Số thẻ gán thiết bị</label>
        <input id="approveSoThe_${idx}" type="text" inputmode="numeric" value="${escapeHtml(d.soTheDangKy || '')}">
        <button type="button" class="save" onclick="approveDevice(${idx})">Duyệt thiết bị</button>
      </div>
    `).join('');
  }

  function approveDevice(index) {
    const d = state.pendingDevices[index];
    if (!d) return;
    const soThe = document.getElementById('approveSoThe_' + index).value;
    if (!soThe.trim()) {
      setDeviceApproveMessage('Vui lòng nhập số thẻ gán thiết bị.', false);
      return;
    }
    if (!confirm('Duyệt thiết bị ' + d.deviceId + ' cho số thẻ ' + soThe + '?')) return;
    setDeviceApproveMessage('Đang duyệt thiết bị...', true);
    const doneBusy = beginBusy('Đang duyệt thiết bị...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setDeviceApproveMessage(res.reason || 'Không duyệt được thiết bị.', false);
          return;
        }
        setDeviceApproveMessage(res.reason || 'Đã duyệt thiết bị.', true);
        loadPendingDevices();
      })
      .withFailureHandler(err => {
        doneBusy();
        setDeviceApproveMessage(err.message, false);
      })
      .apiApproveDevice(authPayload({ targetDeviceId: d.deviceId, soTheDangKy: soThe }));
  }





  function buildLeaveEmployeeOptions() {
    return '<option value="">-- Chọn nhân viên nghỉ --</option>' + (state.leaveEmployees || []).map(e =>
      `<option value="${escapeHtml(e.soThe)}">${escapeHtml(e.soThe)}${e.hoTen ? ' · ' + escapeHtml(e.hoTen) : ''}</option>`
    ).join('');
  }

  function loadEmployeeLeaveInfo(silent) {
    if (!state.context || !state.context.isQL) {
      if (!silent) setLeaveMessage('Chỉ QL được xem/nhập nhân viên nghỉ.', false);
      return;
    }
    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('leaveDate').value
    };
    if (!payload.ngay) {
      if (!silent) setLeaveMessage('Vui lòng chọn ngày nghỉ.', false);
      return;
    }

    if (!silent) {
      setSectionCollapsed('leaveBox', false);
      setLeaveMessage('Đang tải danh sách nhân viên nghỉ...', true);
    }
    const doneBusy = silent ? null : beginBusy('Đang tải danh sách nhân viên nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        if (doneBusy) doneBusy();
        if (!res.ok) {
          if (!silent) setLeaveMessage(res.reason || 'Không tải được nhân viên nghỉ.', false);
          return;
        }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        renderEmployeeLeaveInfo(res);
        if (!silent) setLeaveMessage('Đã tải ' + state.employeeLeaves.length + ' nhân viên nghỉ ngày ' + res.ngay + '.', true);
      })
      .withFailureHandler(err => {
        if (doneBusy) doneBusy();
        if (!silent) setLeaveMessage(err.message, false);
      })
      .apiGetEmployeeLeaveInfo(payload);
  }

  function renderEmployeeLeaveInfo(res) {
    const select = document.getElementById('leaveSoThe');
    const list = document.getElementById('leaveList');
    if (select) select.innerHTML = buildLeaveEmployeeOptions();
    if (!list) return;

    if (!res && (!state.employeeLeaves || !state.employeeLeaves.length)) {
      list.innerHTML = '<p class="empty-note">Danh sách nhân viên nghỉ sẽ tự tải theo ngày đã chọn.</p>';
      return;
    }

    const leaves = state.employeeLeaves || [];
    if (!leaves.length) {
      list.innerHTML = '<p class="empty-note">Ngày này chưa có nhân viên nghỉ.</p>';
      return;
    }

    list.innerHTML = leaves.map((r, idx) => `
      <div class="leave-card-item">
        <div class="entry-head">
          <span>${escapeHtml(r.soThe)}${r.hoTen ? ' - ' + escapeHtml(r.hoTen) : ''}</span>
          <span>NGHỈ ${Number(r.soGioNghi || r.gioNghi || 8)}H</span>
        </div>
        <div class="entry-meta">
          Ngày: ${escapeHtml(r.ngay || '')}<br>
          Số giờ nghỉ: ${Number(r.soGioNghi || r.gioNghi || 8)}h<br>
          Lý do: ${escapeHtml(r.lyDo || '')}<br>
          Nhập bởi: ${escapeHtml(r.nguoiNhap || '')} · ${escapeHtml(r.thoiGianLuu || '')}
        </div>
        <button type="button" class="danger" onclick="cancelEmployeeLeave(${idx})">Hủy dòng nghỉ</button>
      </div>
    `).join('');
  }

  function saveEmployeeLeave() {
    if (!state.context || !state.context.isQL) {
      setLeaveMessage('Chỉ QL được nhập nhân viên nghỉ.', false);
      return;
    }
    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('leaveDate').value,
      soThe: document.getElementById('leaveSoThe').value,
      soGioNghi: Number(document.getElementById('leaveHours').value || 8),
      lyDo: document.getElementById('leaveReason').value
    };
    if (!payload.ngay) {
      setLeaveMessage('Vui lòng chọn ngày nghỉ.', false);
      return;
    }
    if (!payload.soThe) {
      setLeaveMessage('Vui lòng chọn nhân viên nghỉ.', false);
      return;
    }
    if (!payload.soGioNghi || payload.soGioNghi < 1 || payload.soGioNghi > 8) {
      setLeaveMessage('Vui lòng chọn số giờ nghỉ từ 1 đến 8.', false);
      return;
    }
    if (!payload.lyDo.trim()) {
      setLeaveMessage('Vui lòng nhập lý do nghỉ.', false);
      return;
    }

    setLeaveMessage('Đang lưu nhân viên nghỉ...', true);
    const doneBusy = beginBusy('Đang lưu nhân viên nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setLeaveMessage(res.reason || 'Không lưu được nhân viên nghỉ.', false);
          return;
        }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        document.getElementById('leaveReason').value = '';
        document.getElementById('leaveHours').value = '8';
        renderEmployeeLeaveInfo(res);
        setLeaveMessage('Đã lưu nhân viên nghỉ ngày ' + res.ngay + '.', true);
        if (document.getElementById('ngay').value === res.ngay) reloadEmployees(true);
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setLeaveMessage(err.message, false);
      })
      .apiSaveEmployeeLeave(payload);
  }

  function cancelEmployeeLeave(index) {
    const row = (state.employeeLeaves || [])[index];
    if (!row) return;
    const reason = prompt('Nhập lý do hủy dòng nghỉ của ' + row.soThe + ':');
    if (!reason || !reason.trim()) {
      setLeaveMessage('Vui lòng nhập lý do hủy dòng nghỉ.', false);
      return;
    }
    setLeaveMessage('Đang hủy dòng nghỉ...', true);
    const doneBusy = beginBusy('Đang hủy dòng nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setLeaveMessage(res.reason || 'Không hủy được dòng nghỉ.', false);
          return;
        }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        renderEmployeeLeaveInfo(res);
        setLeaveMessage('Đã hủy dòng nghỉ.', true);
        if (document.getElementById('ngay').value === res.ngay) reloadEmployees(true);
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setLeaveMessage(err.message, false);
      })
      .apiCancelEmployeeLeave(authPayload({ leaveId: row.id, reason }));
  }

  function loadManagerDashboard(silent) {
    if (!state.context || !state.context.isQL) return;

    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('dashboardDate').value || document.getElementById('ngay').value || todayText()
    };
    if (!payload.ngay) {
      setDashboardMessage('Vui lòng chọn ngày tổng quan.', false);
      return;
    }

    if (!silent) setSectionCollapsed('dashboardBox', false);
    if (!silent) setDashboardMessage('Đang cập nhật tổng quan...', true);
    renderManagerDashboard(null, silent);
    const doneBusy = silent ? null : beginBusy('Đang cập nhật tổng quan...');

    const dashboardTimer = setTimeout(() => {
      if (!silent) setDashboardMessage('Tải dashboard quá lâu. Kiểm tra Apps Script > Executions hoặc thử tải lại.', false);
    }, 20000);

    google.script.run
      .withSuccessHandler(res => {
        clearTimeout(dashboardTimer);
        if (doneBusy) doneBusy();
        if (!res.ok) {
          setDashboardMessage(res.reason || 'Không tải được dashboard.', false);
          return;
        }
        state.dashboard = res.dashboard || null;
        renderManagerDashboard(state.dashboard);
        if (!silent) setDashboardMessage('Đã cập nhật tổng quan ngày ' + state.dashboard.ngay + '.', true);
        else setDashboardMessage('', true);
      })
      .withFailureHandler(err => {
        clearTimeout(dashboardTimer);
        if (doneBusy) doneBusy();
        setDashboardMessage(err.message, false);
      })
      .apiGetManagerDashboard(payload);
  }

  function renderManagerDashboard(dashboard, silent) {
    const box = document.getElementById('dashboardContent');
    if (!box) return;
    if (!dashboard) {
      if (!silent) box.innerHTML = '<p class="empty-note">Đang chờ dữ liệu tổng quan. Bấm cập nhật để tải lại khi cần.</p>';
      return;
    }

    const statusClass = dashboard.confirmed ? 'locked' : (dashboard.alertLevel === 'DANGER' ? 'danger' : (dashboard.alertLevel === 'WARN' ? 'warn-level' : 'ok-level'));
    const statusText = dashboard.confirmed ? 'ĐÃ CHỐT' : 'ĐANG NHẬP';
    const alerts = (dashboard.alerts || []).map(a => `<li>${escapeHtml(a)}</li>`).join('');
    const confirmedText = dashboard.confirmed
      ? `Xác nhận bởi ${escapeHtml(dashboard.xacNhanBoi || '')} · ${escapeHtml(dashboard.thoiGianXacNhan || '')}`
      : (dashboard.thoiGianMoLai ? `Mở lại bởi ${escapeHtml(dashboard.moLaiBoi || '')} · ${escapeHtml(dashboard.thoiGianMoLai || '')}` : 'Ngày còn đang nhập');

    box.innerHTML = `
      <div class="dashboard-status ${statusClass}">
        <div>
          <b>Ngày ${escapeHtml(dashboard.ngay)}</b>
          <span>${escapeHtml(confirmedText)}</span>
        </div>
        <strong>${statusText}</strong>
      </div>

      <div class="dashboard-grid">
        <div class="dash-card"><span>Phiếu ACTIVE</span><b>${dashboard.activeEntries || 0}</b></div>
        <div class="dash-card"><span>Phiếu đã hủy</span><b>${dashboard.deletedEntries || 0}</b></div>
        <div class="dash-card"><span>Đã phân công</span><b>${dashboard.assignedEmployees || 0}</b></div>
        <div class="dash-card"><span>Tổng giờ</span><b>${dashboard.totalHours || 0}h</b></div>
        <div class="dash-card ok"><span>Đủ 8h</span><b>${dashboard.okEmployees || 0}</b></div>
        <div class="dash-card warn-card"><span>Thiếu giờ</span><b>${dashboard.shortEmployees || 0}</b></div>
        <div class="dash-card danger-card"><span>Vượt 8h</span><b>${dashboard.overEmployees || 0}</b></div>
        <div class="dash-card leave-card"><span>Nghỉ</span><b>${dashboard.leaveEmployees || 0}</b></div>
        <div class="dash-card"><span>Tổng NV</span><b>${dashboard.totalEmployees || 0}</b></div>
      </div>

      <div class="dashboard-alerts">
        <b>Gợi ý kiểm tra</b>
        <ul>${alerts}</ul>
      </div>
      <p class="dashboard-updated">Cập nhật: ${escapeHtml(dashboard.updatedAt || '')}</p>
    `;
  }

  function goDashboardTarget(sectionId) {
    const dashboardDate = document.getElementById('dashboardDate') ? document.getElementById('dashboardDate').value : '';
    if (dashboardDate) {
      if (sectionId === 'workSection' && document.getElementById('ngay')) document.getElementById('ngay').value = dashboardDate;
      if (sectionId === 'leaveBox' && document.getElementById('leaveDate')) document.getElementById('leaveDate').value = dashboardDate;
      if (sectionId === 'manageBox' && document.getElementById('manageDate')) document.getElementById('manageDate').value = dashboardDate;
      if (sectionId === 'dailyBox' && document.getElementById('dailyDate')) document.getElementById('dailyDate').value = dashboardDate;
      if (sectionId === 'reportBox') {
        if (document.getElementById('reportFromDate')) document.getElementById('reportFromDate').value = dashboardDate;
        if (document.getElementById('reportToDate')) document.getElementById('reportToDate').value = dashboardDate;
      }
    }
    setSectionCollapsed(sectionId, false);
    if (sectionId === 'leaveBox') loadEmployeeLeaveInfo(false);
    const el = document.getElementById(sectionId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function loadDailyConfirmInfo() {
    if (!state.context || !state.context.isQL) {
      setDailyMessage('Chỉ QL được kiểm tra/chốt ngày.', false);
      return;
    }

    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('dailyDate').value
    };
    if (!payload.ngay) {
      setDailyMessage('Vui lòng chọn ngày cần kiểm tra.', false);
      return;
    }

    setSectionCollapsed('dailyBox', false);
    setDailyMessage('Đang kiểm tra tổng giờ trong ngày...', true);
    renderDailySummary(null);
    const doneBusy = beginBusy('Đang kiểm tra tổng giờ trong ngày...');

    const dailyLoadTimer = setTimeout(() => {
      setDailyMessage('Kiểm tra ngày quá lâu. Kiểm tra Apps Script > Executions hoặc thử tải lại.', false);
    }, 20000);

    google.script.run
      .withSuccessHandler(res => {
        clearTimeout(dailyLoadTimer);
        doneBusy();
        if (!res.ok) {
          setDailyMessage(res.reason || 'Không kiểm tra được ngày.', false);
          return;
        }
        state.dailyStatus = res.status;
        state.dailySummary = res.summary;
        renderDailySummary(res);
        setDailyMessage('Đã kiểm tra ngày ' + res.summary.ngay + '.', true);
      })
      .withFailureHandler(err => {
        clearTimeout(dailyLoadTimer);
        doneBusy();
        setDailyMessage(err.message, false);
      })
      .apiGetDailyConfirmInfo(payload);
  }

  function renderDailySummary(res) {
    const box = document.getElementById('dailySummary');
    if (!box) return;

    const confirmBtn = document.getElementById('dailyConfirmBtn');
    const reopenBtn = document.getElementById('dailyReopenBtn');
    if (!res || !res.summary) {
      box.innerHTML = '<p class="empty-note">Bấm kiểm tra để xem tổng giờ theo từng nhân viên trong ngày.</p>';
      if (confirmBtn) confirmBtn.disabled = true;
      if (reopenBtn) reopenBtn.disabled = true;
      return;
    }

    const status = res.status || {};
    const summary = res.summary || {};
    const counts = summary.counts || { short: 0, ok: 0, over: 0, total: 0 };
    const confirmed = status.trangThai === 'CONFIRMED';

    if (confirmBtn) confirmBtn.disabled = confirmed || counts.over > 0;
    if (reopenBtn) reopenBtn.disabled = !confirmed;

    const statusClass = confirmed ? 'confirmed' : 'draft';
    const statusExtra = confirmed
      ? `Xác nhận bởi ${escapeHtml(status.xacNhanBoi || '')} · ${escapeHtml(status.thoiGianXacNhan || '')}`
      : (status.thoiGianMoLai ? `Mở lại bởi ${escapeHtml(status.moLaiBoi || '')} · ${escapeHtml(status.thoiGianMoLai || '')}` : 'Dữ liệu còn đang nhập');

    const employeeHtml = (summary.employees || []).map(e => {
      const cls = e.statusCode === 'OVER' ? 'over-hours' : (e.isLeave ? 'leave-hours' : (e.statusCode === 'OK' ? 'ok-hours' : 'short-hours'));
      const detail = e.chiTiet ? escapeHtml(e.chiTiet) : 'Chưa có công việc trong ngày';
      return `
        <div class="daily-employee ${cls}">
          <div>
            <b>${escapeHtml(e.soThe)}${e.hoTen ? ' - ' + escapeHtml(e.hoTen) : ''}</b>
            <div class="daily-detail">${detail}</div>
          </div>
          <div class="daily-hours">
            <b>${Number(e.tongGio || 0)}h</b>
            <span>${escapeHtml(e.trangThaiGio)}</span>
            ${Number(e.gioNghi || 0) > 0 ? '<small>Làm ' + Number(e.gioLam || 0) + 'h · Nghỉ ' + Number(e.gioNghi || 0) + 'h</small>' : ''}
          </div>
        </div>
      `;
    }).join('');

    box.innerHTML = `
      <div class="daily-status-card ${statusClass}">
        <div><b>Trạng thái ngày ${escapeHtml(summary.ngay)}</b></div>
        <div>${escapeHtml(status.trangThaiText || '')}</div>
        <small>${statusExtra}</small>
      </div>
      <div class="daily-counts">
        <span>Phiếu active: <b>${summary.activeEntries || 0}</b></span>
        <span>Phiếu hủy: <b>${summary.deletedEntries || 0}</b></span>
        <span>Đủ 8h: <b>${counts.ok || 0}</b></span>
        <span>Chưa đủ: <b>${counts.short || 0}</b></span>
        <span>Vượt: <b>${counts.over || 0}</b></span>
        <span>Nghỉ: <b>${counts.leave || 0}</b></span>
      </div>
      ${counts.over > 0 ? '<p class="error">Còn nhân viên vượt 8h. Phải sửa dữ liệu trước khi xác nhận/chốt ngày.</p>' : ''}
      ${confirmed ? '<p class="warn">Ngày đã xác nhận: hệ thống chặn lưu phiếu mới, sửa phiếu và hủy phiếu cho đến khi QL mở lại ngày.</p>' : ''}
      <div class="daily-employee-list">${employeeHtml || '<p class="empty-note">Không có nhân viên để hiển thị.</p>'}</div>
    `;
  }

  function confirmDaily() {
    if (!state.context || !state.context.isQL) {
      setDailyMessage('Chỉ QL được xác nhận ngày.', false);
      return;
    }

    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('dailyDate').value,
      ghiChu: document.getElementById('dailyNote').value
    };
    if (!payload.ngay) {
      setDailyMessage('Vui lòng chọn ngày cần xác nhận.', false);
      return;
    }
    if (!confirm('Xác nhận/chốt ngày ' + payload.ngay + '? Sau khi chốt, hệ thống sẽ chặn lưu/sửa/hủy phiếu của ngày này.')) return;

    setDailyMessage('Đang xác nhận ngày...', true);
    const doneBusy = beginBusy('Đang xác nhận/chốt ngày...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setDailyMessage(res.reason || 'Không xác nhận được ngày.', false);
          return;
        }
        state.dailyStatus = res.status;
        state.dailySummary = res.summary;
        renderDailySummary(res);
        setDailyMessage('Đã xác nhận/chốt ngày ' + res.summary.ngay + '.', true);
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setDailyMessage(err.message, false);
      })
      .apiConfirmDaily(payload);

  function reopenDaily() {
    if (!state.context || !state.context.isQL) {
      setDailyMessage('Chỉ QL được mở lại ngày.', false);
      return;
    }

    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('dailyDate').value,
      reason: document.getElementById('dailyNote').value
    };
    if (!payload.ngay) {
      setDailyMessage('Vui lòng chọn ngày cần mở lại.', false);
      return;
    }
    if (!payload.reason.trim()) {
      setDailyMessage('Vui lòng nhập lý do mở lại ngày.', false);
      return;
    }
    if (!confirm('Mở lại ngày ' + payload.ngay + ' để cho phép sửa/lưu/hủy phiếu?')) return;

    setDailyMessage('Đang mở lại ngày...', true);
    const doneBusy = beginBusy('Đang mở lại ngày...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setDailyMessage(res.reason || 'Không mở lại được ngày.', false);
          return;
        }
        state.dailyStatus = res.status;
        state.dailySummary = res.summary;
        renderDailySummary(res);
        setDailyMessage('Đã mở lại ngày ' + res.summary.ngay + '.', true);
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setDailyMessage(err.message, false);
      })
      .apiReopenDaily(payload);
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderEntryList() {
    const box = document.getElementById('entryList');
    if (!box) return;
    if (!state.entries.length) {
      box.innerHTML = '<p class="empty-note">Không có phiếu trong ngày đã chọn.</p>';
      return;
    }

    box.innerHTML = state.entries.map(e => {
      const deleted = e.trangThai === 'DELETED';
      const statusText = deleted ? 'ĐÃ HỦY' : 'ACTIVE';
      const actionHtml = deleted
        ? `<div class="entry-meta">Lý do hủy: ${escapeHtml(e.lyDoHuy || '')}</div>`
        : `<div class="entry-actions">
             <button class="edit-entry" type="button" onclick="editEntry('${escapeHtml(e.phieuId)}')">Sửa phiếu</button>
             <button class="delete-entry" type="button" onclick="deleteEntry('${escapeHtml(e.phieuId)}')">Hủy phiếu</button>
           </div>`;
      return `
        <div class="entry-card ${deleted ? 'deleted' : ''}">
          <div class="entry-head">
            <span>${escapeHtml(e.phieuId)}</span>
            <span>${statusText}</span>
          </div>
          <div class="entry-meta">
            <b>${escapeHtml(e.hangMuc)}</b><br>
            Nội dung: ${escapeHtml(e.noiDungCongViec)}<br>
            Nhân sự: ${escapeHtml(e.nhanSuText || '')}<br>
            Tổng: ${e.soNhanSu || 0} người · ${e.tongGio || 0}h<br>
            Người nhập: ${escapeHtml(e.nguoiNhap)} · Thiết bị: ${escapeHtml(e.deviceId)}
          </div>
          ${actionHtml}
        </div>
      `;
    }).join('');
  }

  function buildEditEmployeeOptions(selectedSoThe) {
    const selected = String(selectedSoThe || '');
    const found = state.editEmployees.some(e => String(e.soThe) === selected);
    let list = state.editEmployees.slice();
    if (selected && !found) {
      list.unshift({ soThe: selected, hoTen: '', conLai: 8 });
    }
    return '<option value="">-- Số thẻ --</option>' + list.map(e => {
      const sel = String(e.soThe) === selected ? ' selected' : '';
      return `<option value="${escapeHtml(e.soThe)}" data-conlai="${e.conLai}"${sel}>${escapeHtml(e.soThe)} · còn ${e.conLai}h${Number(e.gioNghi || 0) > 0 ? ' · nghỉ ' + e.gioNghi + 'h' : ''}</option>`;
    }).join('');
  }

  function buildEditHourOptions(max, selectedHour) {
    let html = '<option value="">Giờ</option>';
    const limit = Math.max(1, Math.min(Number(max || 8), 8));
    for (let i = 1; i <= limit; i++) {
      const sel = Number(selectedHour) === i ? ' selected' : '';
      html += `<option value="${i}"${sel}>${i}h</option>`;
    }
    return html;
  }

  function addEditEmployeeRow(soThe, soGio) {
    const wrap = document.getElementById('editEmployeeRows');
    const row = document.createElement('div');
    row.className = 'edit-emp-row';
    row.innerHTML = `
      <select class="edit-emp" name="editSoThe">${buildEditEmployeeOptions(soThe)}</select>
      <select class="edit-hours" name="editSoGio">${buildEditHourOptions(8, soGio)}</select>
      <button type="button">×</button>
    `;
    const emp = row.querySelector('.edit-emp');
    const hours = row.querySelector('.edit-hours');
    emp.onchange = () => {
      const opt = emp.options[emp.selectedIndex];
      const max = Number(opt.dataset.conlai || 8);
      hours.innerHTML = buildEditHourOptions(max, '');
    };
    const opt = emp.options[emp.selectedIndex];
    if (opt && opt.value) {
      hours.innerHTML = buildEditHourOptions(Number(opt.dataset.conlai || 8), soGio);
    }
    row.querySelector('button').onclick = () => row.remove();
    wrap.appendChild(row);
  }

  function editEntry(phieuId) {
    if (!state.context || !state.context.isQL) {
      setManageMessage('Chỉ QL được sửa phiếu.', false);
      return;
    }

    setManageMessage('Đang tải chi tiết phiếu...', true);
    setEditMessage('', true);
    const doneBusy = beginBusy('Đang tải chi tiết phiếu...');

    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setManageMessage(res.reason || 'Không tải được chi tiết phiếu.', false);
          return;
        }
        state.editingEntry = res.entry;
        state.editEmployees = res.employees || [];
        renderEntryEditForm(res.entry);
        setManageMessage('Đã tải chi tiết phiếu: ' + res.entry.phieuId, true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setManageMessage(err.message, false);
      })
      .apiGetWorkEntryDetail({
        deviceId: state.deviceId,
        deviceToken: state.deviceToken,
        phieuId
      });
  }

  function renderEntryEditForm(entry) {
    const box = document.getElementById('entryEditBox');
    if (!box) return;
    setSectionCollapsed('manageBox', false);
    box.classList.remove('hidden');
    document.getElementById('editPhieuId').value = entry.phieuId || '';
    document.getElementById('editHangMuc').value = entry.hangMuc || '';
    document.getElementById('editNoiDungCongViec').value = entry.noiDungCongViec || '';
    document.getElementById('editReason').value = '';
    document.getElementById('editEmployeeRows').innerHTML = '';
    (entry.details || []).forEach(d => addEditEmployeeRow(d.soThe, d.soGio));
    if (!(entry.details || []).length) addEditEmployeeRow();
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelEntryEdit() {
    const box = document.getElementById('entryEditBox');
    if (box) box.classList.add('hidden');
    state.editingEntry = null;
    state.editEmployees = [];
    setEditMessage('', true);
  }

  function collectEditPayload() {
    const rows = Array.from(document.querySelectorAll('#editEmployeeRows .edit-emp-row'));
    const nhanSu = [];
    const seen = {};

    rows.forEach(row => {
      const soThe = row.querySelector('select[name="editSoThe"]').value;
      const soGio = Number(row.querySelector('select[name="editSoGio"]').value);
      if (!soThe && !soGio) return;
      if (!soThe || !soGio) {
        throw new Error('Có dòng nhân viên sửa chưa chọn đủ số thẻ và số giờ.');
      }
      if (seen[soThe]) {
        throw new Error(`Số thẻ ${soThe} bị chọn trùng trong phiếu sửa. Hãy gộp giờ vào một dòng.`);
      }
      seen[soThe] = true;
      nhanSu.push({ soThe, soGio });
    });

    if (!nhanSu.length) {
      throw new Error('Phiếu sửa phải có ít nhất 1 nhân viên.');
    }

    const payload = {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      phieuId: document.getElementById('editPhieuId').value,
      noiDungCongViec: document.getElementById('editNoiDungCongViec').value,
      reason: document.getElementById('editReason').value,
      nhanSu,
      nhanSuJson: JSON.stringify(nhanSu)
    };

    if (!payload.reason.trim()) throw new Error('Vui lòng nhập lý do sửa phiếu.');
    return payload;
  }

  function saveEntryEdit() {
    let payload;
    try {
      payload = collectEditPayload();
    } catch (err) {
      setEditMessage(err.message, false);
      return;
    }

    if (!confirm('Xác nhận lưu sửa phiếu ' + payload.phieuId + '?')) return;

    setEditMessage('Đang lưu sửa phiếu...', true);
    const doneBusy = beginBusy('Đang lưu sửa phiếu...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setEditMessage(res.reason || 'Không sửa được phiếu.', false);
          return;
        }
        setEditMessage('Đã sửa phiếu: ' + res.phieuId + ' · ' + res.updatedNhanSu + ' nhân viên', true);
        reloadEmployees(true);
        loadWorkEntries();
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setEditMessage(err.message, false);
      })
      .apiUpdateWorkEntry(payload);
  }

  function deleteEntry(phieuId) {
    const reason = prompt('Nhập lý do hủy phiếu ' + phieuId + ':');
    if (reason === null) return;
    if (!reason.trim()) {
      setManageMessage('Lý do hủy phiếu không được trống.', false);
      return;
    }
    if (!confirm('Xác nhận hủy phiếu ' + phieuId + '? Dữ liệu sẽ không bị xóa vật lý, nhưng báo cáo và tính giờ sẽ bỏ qua phiếu này.')) {
      return;
    }

    setManageMessage('Đang hủy phiếu...', true);
    const doneBusy = beginBusy('Đang hủy phiếu...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) {
          setManageMessage(res.reason || 'Không hủy được phiếu.', false);
          return;
        }
        setManageMessage('Đã hủy phiếu: ' + res.phieuId, true);
        reloadEmployees(true);
        loadWorkEntries();
        if (state.context && state.context.isQL) loadManagerDashboard(true);
      })
      .withFailureHandler(err => {
        doneBusy();
        setManageMessage(err.message, false);
      })
      .apiSoftDeleteWorkEntry({
        deviceId: state.deviceId,
        deviceToken: state.deviceToken,
        phieuId,
        reason
      });
  }


  window.addEventListener('load', init);
</script>
