<script>
  // Version: V0.12.2_MOBILE_NAV_UI_POLISH
  const state = {
    linkDeviceId: window.__DEVICE_ID__ || '',
    deviceId: '',
    deviceToken: '',
    context: null,
    version: '',
    jobs: [],
    employees: [],
    entries: [],
    dailyStatus: null,
    dailySummary: null,
    dashboard: null,
    pendingDevices: [],
    editEmployees: [],
    editingEntry: null,
    leaveEmployees: [],
    employeeLeaves: [],
    busyCount: 0,
    busyStartedAt: 0,
    busyTimer: null,
    busyLabel: '',
    busyDisabledButtons: [],
    activeShellTab: ''
  };

  const DEVICE_AUTH_KEY = 'VNPS_WORK_ASSIGN_DEVICE_AUTH_V1';

  function todayText() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }

  function randomPart(length) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    if (window.crypto && window.crypto.getRandomValues) {
      const arr = new Uint32Array(length);
      window.crypto.getRandomValues(arr);
      for (let i = 0; i < length; i++) out += chars[arr[i] % chars.length];
      return out;
    }
    for (let i = 0; i < length; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  function createBrowserAuth() {
    const datePart = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    return {
      deviceId: 'DEV_' + datePart + '_' + randomPart(8),
      deviceToken: randomPart(32),
      createdAt: new Date().toISOString()
    };
  }

  function loadBrowserAuth() {
    try {
      const raw = localStorage.getItem(DEVICE_AUTH_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.deviceId || !parsed.deviceToken) return null;
      return parsed;
    } catch (err) {
      return null;
    }
  }

  function saveBrowserAuth(auth) {
    localStorage.setItem(DEVICE_AUTH_KEY, JSON.stringify(auth));
  }

  function getOrCreateBrowserAuth() {
    let auth = loadBrowserAuth();
    if (!auth) {
      auth = createBrowserAuth();
      saveBrowserAuth(auth);
    }
    return auth;
  }

  function resetBrowserDevice() {
    if (!confirm('Đăng ký lại thiết bị trên trình duyệt này? Thiết bị hiện tại sẽ mất quyền trên trình duyệt này và phải chờ QL duyệt lại.')) return;
    localStorage.removeItem(DEVICE_AUTH_KEY);
    location.href = location.origin + location.pathname;
  }

  function authPayload(extra) {
    return Object.assign({ deviceId: state.deviceId, deviceToken: state.deviceToken }, extra || {});
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function setTextMessage(id, text, ok) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || '';
    el.className = ok ? 'ok' : 'error';
  }
  function setMessage(text, ok) { setTextMessage('message', text, ok); }
  function setRegisterMessage(text, type) {
    const el = document.getElementById('registerMessage');
    if (!el) return;
    el.textContent = text || '';
    el.className = type || 'error';
  }
  function setReportMessage(text, ok) { setTextMessage('reportMessage', text, ok); }
  function setDashboardMessage(text, ok) {
    const el = document.getElementById('dashboardMessage');
    if (!el) return;
    if (!text) { el.textContent = ''; el.className = 'message-line'; return; }
    el.textContent = text;
    el.className = ok ? 'ok' : 'error';
  }
  function setDailyMessage(text, ok) { setTextMessage('dailyMessage', text, ok); }
  function setManageMessage(text, ok) { setTextMessage('manageMessage', text, ok); }
  function setLeaveMessage(text, ok) { setTextMessage('leaveMessage', text, ok); }
  function setEditMessage(text, ok) { setTextMessage('editMessage', text, ok); }
  function setDeviceApproveMessage(text, ok) { setTextMessage('deviceApproveMessage', text, ok); }

  function updateBusyOverlay() {
    const overlay = document.getElementById('busyOverlay');
    if (!overlay || !state.busyStartedAt) return;
    const textEl = document.getElementById('busyText');
    const secEl = document.getElementById('busySeconds');
    const seconds = Math.max(0, Math.floor((Date.now() - state.busyStartedAt) / 1000));
    if (textEl) textEl.textContent = state.busyLabel || 'Đang thực hiện...';
    if (secEl) secEl.textContent = seconds + ' giây';
  }

  function beginBusy(label) {
    state.busyCount = Number(state.busyCount || 0) + 1;
    state.busyLabel = label || 'Đang thực hiện...';
    if (state.busyCount === 1) {
      state.busyStartedAt = Date.now();
      state.busyDisabledButtons = Array.from(document.querySelectorAll('button')).map(btn => ({ btn, disabled: btn.disabled }));
      state.busyDisabledButtons.forEach(item => { if (!item.disabled) item.btn.disabled = true; });
      const overlay = document.getElementById('busyOverlay');
      if (overlay) overlay.classList.remove('hidden');
      document.body.classList.add('is-busy');
      updateBusyOverlay();
      state.busyTimer = setInterval(updateBusyOverlay, 1000);
    } else {
      updateBusyOverlay();
    }
    let closed = false;
    return function endBusy() {
      if (closed) return;
      closed = true;
      state.busyCount = Math.max(0, Number(state.busyCount || 0) - 1);
      if (state.busyCount > 0) return;
      if (state.busyTimer) clearInterval(state.busyTimer);
      state.busyTimer = null;
      state.busyStartedAt = 0;
      state.busyLabel = '';
      (state.busyDisabledButtons || []).forEach(item => {
        if (item.btn && document.contains(item.btn)) item.btn.disabled = item.disabled;
      });
      state.busyDisabledButtons = [];
      const overlay = document.getElementById('busyOverlay');
      if (overlay) overlay.classList.add('hidden');
      document.body.classList.remove('is-busy');
    };
  }

  function hasPerm(name) {
    return !!(state.context && state.context[name]);
  }

  function installDropdownTouchGuard() {
    if (window.__VNPS_DROPDOWN_TOUCH_GUARD__) return;
    window.__VNPS_DROPDOWN_TOUCH_GUARD__ = true;
    ['touchstart', 'mousedown', 'click'].forEach(evtName => {
      document.addEventListener(evtName, function(evt) {
        const target = evt.target;
        if (!target || !target.closest) return;
        if (target.closest('select, input, textarea, option')) {
          evt.stopPropagation();
        }
      }, true);
    });
  }


  const MOBILE_SHELL_TABS = [
    { id: 'dashboardBox', label: 'Tổng quan', icon: '📌', perm: 'canViewOverview' },
    { id: 'workSection', label: 'Nhập', icon: '📝', perm: 'canManageWorkEntry' },
    { id: 'leaveBox', label: 'Nghỉ', icon: '🏖️', perm: 'canManageLeave' },
    { id: 'reportBox', label: 'Báo cáo', icon: '📊', perm: 'canReport' },
    { id: 'manageBox', label: 'Phiếu', icon: '🗂️', perm: 'canManageWorkEntry' },
    { id: 'dailyBox', label: 'Chốt', icon: '✅', perm: 'canConfirmDay' },
    { id: 'deviceApproveBox', label: 'Thiết bị', icon: '🔐', perm: 'canManageDevice' }
  ];

  function shellTabsForCurrentUser() {
    return MOBILE_SHELL_TABS.filter(tab => hasPerm(tab.perm));
  }

  function getDefaultShellTab() {
    const tabs = shellTabsForCurrentUser();
    if (!tabs.length) return '';
    const overview = tabs.find(tab => tab.id === 'dashboardBox');
    return (overview || tabs[0]).id;
  }

  function ensureMobileShellStyle() {
    if (document.getElementById('mobileShellStyle')) return;
    const style = document.createElement('style');
    style.id = 'mobileShellStyle';
    style.textContent = `
      body.shell-mode .identity-card { margin-bottom: 8px; }
      .mobile-nav-shell {
        position: relative;
        z-index: 1;
        margin-top: 10px;
        margin-bottom: 10px;
        background: rgba(241, 245, 249, .96);
        backdrop-filter: blur(8px);
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 8px;
        box-shadow: 0 2px 10px rgba(15, 23, 42, .10);
      }
      .mobile-nav-shell-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 8px;
        color: #334155;
        font-size: 13px;
        font-weight: 800;
      }
      .mobile-nav-shell-title b { color: #0f766e; }
      .mobile-nav-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
      .mobile-nav-tab {
        min-height: 46px;
        padding: 8px 6px;
        border-radius: 11px;
        background: #e2e8f0;
        color: #334155;
        font-size: 14px;
        line-height: 1.15;
        display: grid;
        place-items: center;
        gap: 2px;
      }
      .mobile-nav-tab .nav-icon { font-size: 16px; line-height: 1; }
      .mobile-nav-tab.active {
        background: #0f766e;
        color: #fff;
        box-shadow: 0 4px 12px rgba(15, 118, 110, .28);
      }
      .mobile-nav-tab.active::before {
        content: '✓';
        display: inline-grid;
        place-items: center;
        width: 17px;
        height: 17px;
        border-radius: 999px;
        background: rgba(255,255,255,.22);
        font-size: 12px;
        font-weight: 900;
        line-height: 1;
      }
      body.shell-mode .quick-actions { display: none !important; }
      .leave-card-top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
      }
      .leave-card-title b,
      .leave-card-title span { display: block; }
      .leave-card-title span { color: #475569; font-size: 14px; margin-top: 2px; }
      .leave-card-actions { display: flex; gap: 6px; }
      .leave-card-actions button {
        min-height: 36px;
        padding: 8px 10px;
        font-size: 13px;
        border-radius: 10px;
        white-space: nowrap;
      }
      .leave-card-actions .edit-leave { background: #2563eb; }
      .leave-card-actions .danger { background: #dc2626; }
      .daily-hours b.compact { font-size: 15px; line-height: 1.25; }
      body.shell-mode select,
      body.shell-mode input,
      body.shell-mode textarea {
        pointer-events: auto !important;
        touch-action: auto !important;
        position: relative;
        z-index: 2;
      }
      body.shell-mode select {
        -webkit-appearance: menulist !important;
        appearance: auto !important;
      }
      body.shell-mode .section-body { overflow: visible; }
      body.shell-mode .section-card.shell-hidden { display: none !important; }
      body.shell-mode .section-card:not(.shell-hidden) { margin-top: 10px; }
      body.shell-mode .section-card:not(.shell-hidden) .section-toggle { pointer-events: none; }
      body.shell-mode .section-card:not(.shell-hidden) .section-state { display: none; }
      body.shell-mode .section-card.collapsed:not(.shell-hidden) .section-body { display: block; }
      body.shell-mode .section-card:not(.shell-hidden) .section-subtitle { display: none; }
      @media (max-width: 520px) {
        .mobile-nav-shell { margin-left: -1px; margin-right: -1px; }
        .mobile-nav-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .mobile-nav-tab { font-size: 13px; padding: 7px 4px; }
        .leave-card-top { grid-template-columns: 1fr; }
        .leave-card-actions { justify-content: flex-end; }
      }
      @media (max-width: 360px) {
        .mobile-nav-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    `;
    document.head.appendChild(style);
  }

  function ensureMobileShellNav() {
    const formArea = document.getElementById('formArea');
    if (!formArea) return;
    ensureMobileShellStyle();
    let nav = document.getElementById('mobileNavShell');
    if (!nav) {
      nav = document.createElement('section');
      nav.id = 'mobileNavShell';
      nav.className = 'mobile-nav-shell';
      const identity = formArea.querySelector('.identity-card');
      if (identity && identity.parentNode) identity.parentNode.insertBefore(nav, identity.nextSibling);
      else formArea.insertBefore(nav, formArea.firstChild);
    }

    const tabs = shellTabsForCurrentUser();
    nav.innerHTML = `
      <div class="mobile-nav-shell-title">
        <span>Tab chức năng</span>
      </div>
      <div class="mobile-nav-tabs">
        ${tabs.map(tab => `
          <button type="button" class="mobile-nav-tab" data-tab="${tab.id}" onclick="setActiveShellTab('${tab.id}')">
            <span class="nav-icon">${tab.icon}</span>
            <span>${escapeHtml(tab.label)}</span>
          </button>
        `).join('')}
      </div>`;
    document.body.classList.add('shell-mode');
  }

  function setActiveShellTab(sectionId, options) {
    const opts = options || {};
    const tabs = shellTabsForCurrentUser();
    const allowed = tabs.some(tab => tab.id === sectionId);
    const nextId = allowed ? sectionId : getDefaultShellTab();
    if (!nextId) return;
    state.activeShellTab = nextId;

    MOBILE_SHELL_TABS.forEach(tab => {
      const el = document.getElementById(tab.id);
      if (!el) return;
      const canSee = hasPerm(tab.perm);
      el.classList.toggle('hidden', !canSee);
      el.classList.toggle('shell-hidden', !canSee || tab.id !== nextId);
      if (canSee && tab.id === nextId) setSectionCollapsed(tab.id, false);
    });

    document.querySelectorAll('.mobile-nav-tab').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === nextId);
    });

    if (!opts.noAutoLoad) {
      if (nextId === 'dashboardBox' && hasPerm('canViewOverview')) loadManagerDashboard(true);
      if (nextId === 'leaveBox' && hasPerm('canManageLeave')) loadEmployeeLeaveInfo(true);
      if (nextId === 'workSection' && hasPerm('canManageWorkEntry') && !state.employees.length) reloadEmployees(true);
    }
  }

  function hideAllAreas() {
    ['blocked', 'registerArea', 'pendingArea', 'formArea'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    });
  }

  function setSectionCollapsed(sectionId, collapsed) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    section.classList.toggle('collapsed', !!collapsed);
    const stateLabel = section.querySelector('.section-state');
    if (stateLabel) stateLabel.textContent = collapsed ? 'Mở' : 'Thu gọn';
  }

  function toggleSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    setSectionCollapsed(sectionId, !section.classList.contains('collapsed'));
  }

  function resetMobileSections() {
    setSectionCollapsed('dashboardBox', false);
    setSectionCollapsed('deviceApproveBox', true);
    setSectionCollapsed('workSection', false);
    setSectionCollapsed('leaveBox', true);
    setSectionCollapsed('manageBox', true);
    setSectionCollapsed('dailyBox', true);
    setSectionCollapsed('reportBox', true);
  }

  function init() {
    installDropdownTouchGuard();
    document.getElementById('ngay').value = todayText();
    const auth = getOrCreateBrowserAuth();
    state.deviceId = auth.deviceId;
    state.deviceToken = auth.deviceToken;
    const doneBusy = beginBusy('Đang kiểm tra thiết bị...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { handleInitBlocked(res); return; }
        state.context = res.context;
        state.version = res.version || '';
        state.jobs = res.jobs || [];
        state.employees = res.employees || [];
        renderForm();
      })
      .withFailureHandler(err => { doneBusy(); showBlocked(err.message); })
      .apiInit(authPayload({ ngay: document.getElementById('ngay').value }));
  }

  function handleInitBlocked(res) {
    if (res.canRegister || res.code === 'DEVICE_NOT_REGISTERED') { showRegisterDevice(res.deviceId || state.deviceId, res.reason); return; }
    if (res.code === 'DEVICE_PENDING') { showPending(res.reason); return; }
    showBlocked(res.reason);
  }

  function showBlocked(reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Bị chặn truy cập';
    document.getElementById('blockedReason').textContent = reason || 'Không rõ lý do.';
    document.getElementById('blocked').classList.remove('hidden');
  }

  function showRegisterDevice(deviceId, reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Thiết bị chưa đăng ký';
    document.getElementById('regDeviceId').value = deviceId || state.deviceId;
    const legacyHint = state.linkDeviceId ? ' Link có deviceId cũ chỉ dùng để tham khảo; quyền đăng nhập sẽ gắn với trình duyệt hiện tại.' : '';
    setRegisterMessage((reason || 'Vui lòng gửi thông tin đăng ký thiết bị.') + legacyHint, 'warn');
    document.getElementById('registerArea').classList.remove('hidden');
  }

  function showPending(reason) {
    hideAllAreas();
    document.getElementById('status').textContent = 'Chờ duyệt thiết bị';
    document.getElementById('pendingReason').textContent = reason || 'Thiết bị đang chờ duyệt.';
    document.getElementById('pendingArea').classList.remove('hidden');
  }

  function submitDeviceRegister() {
    const payload = {
      deviceId: document.getElementById('regDeviceId').value,
      deviceToken: state.deviceToken,
      tenThietBi: document.getElementById('regTenThietBi').value,
      soTheDangKy: document.getElementById('regSoThe').value,
      ghiChu: document.getElementById('regGhiChu').value
    };
    if (!payload.tenThietBi.trim()) { setRegisterMessage('Vui lòng nhập tên thiết bị.', 'error'); return; }
    if (!payload.soTheDangKy.trim()) { setRegisterMessage('Vui lòng nhập số thẻ đăng ký.', 'error'); return; }
    setRegisterMessage('Đang gửi đăng ký thiết bị...', 'ok');
    const doneBusy = beginBusy('Đang gửi đăng ký thiết bị...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { setRegisterMessage(res.reason || 'Không đăng ký được thiết bị.', 'error'); return; }
        showPending(res.reason || 'Đã gửi đăng ký thiết bị. Vui lòng chờ duyệt.');
      })
      .withFailureHandler(err => { doneBusy(); setRegisterMessage(err.message, 'error'); })
      .apiRegisterDevice(payload);
  }


  function normalizeUiLabelsV0122() {
    const dashboardTitle = document.querySelector('#dashboardBox .section-title');
    if (dashboardTitle) dashboardTitle.textContent = '📌 Tổng quan';
  }

  function normalizeLeaveHourOptions() {
    const leaveHours = document.getElementById('leaveHours');
    if (!leaveHours) return;
    const current = String(leaveHours.value || '8');
    leaveHours.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = i + 'h';
      if (String(i) === current) opt.selected = true;
      leaveHours.appendChild(opt);
    }
    if (!leaveHours.value) leaveHours.value = '8';
  }

  function compactDailyHourText(e) {
    const gioLam = Number(e && e.gioLam || 0);
    const gioNghi = Number(e && e.gioNghi || 0);
    const tong = Number(e && e.tongGio || (gioLam + gioNghi) || 0);
    const max = 8;
    if (gioNghi > 0) {
      let text = 'Làm ' + gioLam + 'h · Nghỉ ' + gioNghi + 'h';
      if (tong < max) text += ' · Thiếu ' + (max - tong) + 'h';
      if (tong > max) text += ' · Vượt ' + (tong - max) + 'h';
      return text;
    }
    if (tong === max) return 'Đủ 8h';
    if (tong < max) return 'Thiếu ' + (max - tong) + 'h';
    return 'Vượt ' + (tong - max) + 'h';
  }

  function renderForm() {
    hideAllAreas();
    document.getElementById('status').textContent = 'Thiết bị hợp lệ';
    document.getElementById('formArea').classList.remove('hidden');
    resetMobileSections();
    document.getElementById('userInfo').innerHTML = `
      <div class="identity-title">${escapeHtml(state.context.soThe)} - ${escapeHtml(state.context.hoTen)}</div>
      <div class="identity-grid">
        <span class="identity-chip"><span class="chip-label">Mã NV</span><span class="chip-value">${escapeHtml(state.context.nhanVienID || '')}</span></span>
        <span class="identity-chip"><span class="chip-label">Thiết bị</span><span class="chip-value">${escapeHtml(state.context.deviceId)}</span></span>
        <span class="identity-chip"><span class="chip-label">Quyền</span><span class="chip-value">${escapeHtml(state.context.viTri)}</span></span>
        <span class="identity-chip"><span class="chip-label">Version</span><span class="chip-value">${escapeHtml(state.version || '')}</span></span>
      </div>`;

    normalizeUiLabelsV0122();
    normalizeLeaveHourOptions();

    const dashboardBox = document.getElementById('dashboardBox');
    if (dashboardBox) {
      dashboardBox.classList.toggle('hidden', !hasPerm('canViewOverview'));
      document.getElementById('dashboardDate').value = document.getElementById('ngay').value || todayText();
      renderManagerDashboard(null);
      if (hasPerm('canViewOverview')) loadManagerDashboard(true);
    }
    const deviceApproveBox = document.getElementById('deviceApproveBox');
    if (deviceApproveBox) { deviceApproveBox.classList.toggle('hidden', !hasPerm('canManageDevice')); renderPendingDevices(); }
    const workSection = document.getElementById('workSection');
    if (workSection) workSection.classList.toggle('hidden', !hasPerm('canManageWorkEntry'));
    const leaveBox = document.getElementById('leaveBox');
    if (leaveBox) {
      leaveBox.classList.toggle('hidden', !hasPerm('canManageLeave'));
      const leaveDateInput = document.getElementById('leaveDate');
      leaveDateInput.value = document.getElementById('ngay').value || todayText();
      leaveDateInput.onchange = () => loadEmployeeLeaveInfo(false);
      renderEmployeeLeaveInfo(null);
      if (hasPerm('canManageLeave')) loadEmployeeLeaveInfo(true);
    }
    const reportBox = document.getElementById('reportBox');
    if (reportBox) {
      reportBox.classList.toggle('hidden', !hasPerm('canReport'));
      document.getElementById('reportFromDate').value = document.getElementById('ngay').value || todayText();
      document.getElementById('reportToDate').value = document.getElementById('ngay').value || todayText();
    }
    const manageBox = document.getElementById('manageBox');
    if (manageBox) { manageBox.classList.toggle('hidden', !hasPerm('canManageWorkEntry')); document.getElementById('manageDate').value = document.getElementById('ngay').value || todayText(); }
    const dailyBox = document.getElementById('dailyBox');
    if (dailyBox) { dailyBox.classList.toggle('hidden', !hasPerm('canConfirmDay')); document.getElementById('dailyDate').value = document.getElementById('ngay').value || todayText(); renderDailySummary(null); }

    ensureMobileShellNav();

    const jobSelect = document.getElementById('maCongViec');
    jobSelect.innerHTML = '<option value="">-- Chọn hạng mục --</option>';
    state.jobs.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j.maCongViec;
      opt.textContent = `${j.maCongViec} · ${j.hangMuc}`;
      jobSelect.appendChild(opt);
    });
    jobSelect.onchange = () => {
      document.getElementById('newJobBox').classList.toggle('hidden', jobSelect.value !== window.__ADD_NEW_JOB_VALUE__);
    };

    applyQuickActionPermissions();
    const defaultTab = state.activeShellTab || getDefaultShellTab();
    setActiveShellTab(defaultTab, { noAutoLoad: true });
    document.getElementById('ngay').onchange = onWorkDateChange;
    document.getElementById('employeeRows').innerHTML = '';
    if (hasPerm('canManageWorkEntry')) addEmployeeRow();
  }

  function applyQuickActionPermissions() {

    const workDate = document.getElementById('ngay').value || todayText();
    const dashboardDate = document.getElementById('dashboardDate');
    if (dashboardDate && hasPerm('canViewOverview')) dashboardDate.value = workDate;
    const leaveDate = document.getElementById('leaveDate');
    if (leaveDate && hasPerm('canManageLeave')) leaveDate.value = workDate;
    if (hasPerm('canManageWorkEntry')) reloadEmployees(true);
    if (hasPerm('canManageLeave')) loadEmployeeLeaveInfo(true);
    if (hasPerm('canViewOverview')) loadManagerDashboard(true);

  function reloadEmployees(silent) {
    if (!hasPerm('canManageWorkEntry')) return;
    const doneBusy = silent ? null : beginBusy('Đang tải danh sách nhân viên...');
    google.script.run
      .withSuccessHandler(res => {
        if (doneBusy) doneBusy();
        if (!res.ok) { setMessage(res.reason, false); return; }
        state.employees = res.employees || [];
        document.getElementById('employeeRows').innerHTML = '';
        addEmployeeRow();
      })
      .withFailureHandler(err => { if (doneBusy) doneBusy(); setMessage(err.message, false); })
      .apiGetAvailableEmployees(authPayload({ ngay: document.getElementById('ngay').value }));

  function employeeOptionValue(e) { return e.nhanVienID || e.soThe || ''; }
  function buildEmployeeOptions() {
    return '<option value="">-- Số thẻ --</option>' + state.employees.map(e => {
      const value = escapeHtml(employeeOptionValue(e));
      return `<option value="${value}" data-nhanvienid="${escapeHtml(e.nhanVienID || '')}" data-sothe="${escapeHtml(e.soThe || '')}" data-conlai="${e.conLai}">${escapeHtml(e.soThe)}${e.hoTen ? ' · ' + escapeHtml(e.hoTen) : ''} · còn ${e.conLai}h${Number(e.gioNghi || 0) > 0 ? ' · nghỉ ' + e.gioNghi + 'h' : ''}</option>`;
    }).join('');
  }

  function buildHourOptions(max) {
    let html = '<option value="">Giờ</option>';
    const limit = Math.max(1, Math.min(Number(max || 8), 8));
    for (let i = 1; i <= limit; i++) html += `<option value="${i}">${i}h</option>`;
    return html;
  }

  function addEmployeeRow() {
    const wrap = document.getElementById('employeeRows');
    const row = document.createElement('div');
    row.className = 'emp-row';
    row.innerHTML = `<select class="emp" name="soThe">${buildEmployeeOptions()}</select><select class="hours" name="soGio">${buildHourOptions(8)}</select><button type="button">×</button>`;
    const emp = row.querySelector('.emp');
    const hours = row.querySelector('.hours');
    emp.onchange = () => {
      const opt = emp.options[emp.selectedIndex];
      const max = Number(opt.dataset.conlai || 8);
      hours.innerHTML = buildHourOptions(max);
    };
    row.querySelector('button').onclick = () => row.remove();
    wrap.appendChild(row);
  }

  function collectPayload() {
    const rows = Array.from(document.querySelectorAll('#employeeRows .emp-row'));
    const nhanSu = [];
    const seen = {};
    rows.forEach(row => {
      const sel = row.querySelector('select[name="soThe"]');
      const opt = sel.options[sel.selectedIndex];
      const nhanVienID = opt ? (opt.dataset.nhanvienid || '') : '';
      const soThe = opt ? (opt.dataset.sothe || '') : '';
      const key = nhanVienID || soThe || sel.value;
      const soGio = Number(row.querySelector('select[name="soGio"]').value);
      if (!key && !soGio) return;
      if (!key || !soGio) throw new Error('Có dòng nhân viên chưa chọn đủ số thẻ và số giờ.');
      if (seen[key]) throw new Error(`Nhân viên ${soThe || key} bị chọn trùng trong cùng phiếu. Hãy gộp giờ vào một dòng.`);
      seen[key] = true;
      nhanSu.push({ nhanVienID, soThe, soGio });
    });
    if (!nhanSu.length) throw new Error('Chưa chọn nhân viên tham gia.');
    return {
      deviceId: state.deviceId,
      deviceToken: state.deviceToken,
      ngay: document.getElementById('ngay').value,
      maCongViec: document.getElementById('maCongViec').value,
      hangMucMoi: document.getElementById('hangMucMoi').value,
      noiDungCongViec: document.getElementById('noiDungCongViec').value,
      nhanSu,
      nhanSuJson: JSON.stringify(nhanSu)
    };
  }

  function saveForm() {
    if (!hasPerm('canManageWorkEntry')) { setMessage('Chỉ QL được nhập công việc.', false); return; }
    let payload;
    try { payload = collectPayload(); } catch (err) { setMessage(err.message, false); return; }
    setMessage(`Đang lưu ${payload.nhanSu.length} nhân viên...`, true);
    const doneBusy = beginBusy('Đang lưu công việc...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        setMessage(`Đã lưu: ${res.phieuId} · ${res.soDongNhanSu} nhân viên`, true);
        document.getElementById('noiDungCongViec').value = '';
        document.getElementById('hangMucMoi').value = '';
        reloadEmployees(true);
        if (hasPerm('canViewOverview')) loadManagerDashboard(true);
      })
      .withFailureHandler(err => { doneBusy(); setMessage(err.message, false); })
      .apiSaveWorkEntry(payload);
  }

    setSectionCollapsed('deviceApproveBox', false);

        <label>Số thẻ gán thiết bị</label>

  function approveDevice(index) {
    const d = state.pendingDevices[index];
    if (!d) return;
    const soThe = document.getElementById('approveSoThe_' + index).value;
    if (!soThe.trim()) { setDeviceApproveMessage('Vui lòng nhập số thẻ gán thiết bị.', false); return; }

    setDeviceApproveMessage('Đang duyệt thiết bị...', true);
    const doneBusy = beginBusy('Đang duyệt thiết bị...');
    google.script.run
      .withSuccessHandler(res => {

        if (!res.ok) { setDeviceApproveMessage(res.reason || 'Không duyệt được thiết bị.', false); return; }
        setDeviceApproveMessage(res.reason || 'Đã duyệt thiết bị.', true);
        loadPendingDevices();
      })
      .withFailureHandler(err => { doneBusy(); setDeviceApproveMessage(err.message, false); })

  function buildLeaveEmployeeOptions() {
    return '<option value="">-- Chọn nhân viên nghỉ --</option>' + (state.leaveEmployees || []).map(e => {
      const value = escapeHtml(employeeOptionValue(e));
      return `<option value="${value}" data-nhanvienid="${escapeHtml(e.nhanVienID || '')}" data-sothe="${escapeHtml(e.soThe || '')}">${escapeHtml(e.soThe)}${e.hoTen ? ' · ' + escapeHtml(e.hoTen) : ''}</option>`;
    }).join('');

  function loadEmployeeLeaveInfo(silent) {
    if (!hasPerm('canManageLeave')) { if (!silent) setLeaveMessage('Chỉ QL/NS được xem/nhập nhân viên nghỉ.', false); return; }
    const payload = authPayload({ ngay: document.getElementById('leaveDate').value });
    if (!payload.ngay) { if (!silent) setLeaveMessage('Vui lòng chọn ngày nghỉ.', false); return; }
    if (!silent) { setSectionCollapsed('leaveBox', false); setLeaveMessage('Đang tải danh sách nhân viên nghỉ...', true); }
    const doneBusy = silent ? null : beginBusy('Đang tải danh sách nhân viên nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        if (doneBusy) doneBusy();
        if (!res.ok) { if (!silent) setLeaveMessage(res.reason || 'Không tải được nhân viên nghỉ.', false); return; }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        renderEmployeeLeaveInfo(res);
        if (!silent) setLeaveMessage('Đã tải ' + state.employeeLeaves.length + ' nhân viên nghỉ ngày ' + res.ngay + '.', true);
      })
      .withFailureHandler(err => { if (doneBusy) doneBusy(); if (!silent) setLeaveMessage(err.message, false); })
      .apiGetEmployeeLeaveInfo(payload);

  function renderEmployeeLeaveInfo(res) {
    const select = document.getElementById('leaveSoThe');
    const list = document.getElementById('leaveList');
    normalizeLeaveHourOptions();
    if (select) select.innerHTML = buildLeaveEmployeeOptions();
    if (!list) return;
    if (!res && (!state.employeeLeaves || !state.employeeLeaves.length)) {
      list.innerHTML = '<p class="empty-note">Danh sách nhân viên nghỉ sẽ tự tải theo ngày đã chọn.</p>';
      return;
    }
    const leaves = state.employeeLeaves || [];
    if (!leaves.length) {
      list.innerHTML = '<p class="empty-note">Ngày này chưa có nhân viên nghỉ.</p>';
      return;
    }
    list.innerHTML = leaves.map((r, idx) => {
      const h = Number(r.soGioNghi || r.gioNghi || 8);

      <div class="leave-card-item">
        <div class="leave-card-top">
          <div class="leave-card-title">
            <b>${escapeHtml(r.soThe)}${r.hoTen ? ' - ' + escapeHtml(r.hoTen) : ''}</b>

          </div>
        </div>
        <div class="entry-meta">Ngày: ${escapeHtml(r.ngay || '')}<br>Nhập bởi: ${escapeHtml(r.nguoiNhap || '')} · ${escapeHtml(r.thoiGianLuu || '')}</div>
      </div>`;
    }).join('');
  }

  function saveEmployeeLeave() {
    if (!hasPerm('canManageLeave')) { setLeaveMessage('Chỉ QL/NS được nhập nhân viên nghỉ.', false); return; }
    const sel = document.getElementById('leaveSoThe');
    const opt = sel.options[sel.selectedIndex];
    const payload = authPayload({
      ngay: document.getElementById('leaveDate').value,
      nhanVienID: opt ? (opt.dataset.nhanvienid || '') : '',
      soThe: opt ? (opt.dataset.sothe || '') : '',
      soGioNghi: Number(document.getElementById('leaveHours').value || 8),
      lyDo: document.getElementById('leaveReason').value
    });
    if (!payload.ngay) { setLeaveMessage('Vui lòng chọn ngày nghỉ.', false); return; }
    if (!payload.nhanVienID && !payload.soThe) { setLeaveMessage('Vui lòng chọn nhân viên nghỉ.', false); return; }
    if (!payload.soGioNghi || payload.soGioNghi < 1 || payload.soGioNghi > 8) { setLeaveMessage('Vui lòng chọn số giờ nghỉ từ 1 đến 8.', false); return; }
    if (!payload.lyDo.trim()) { setLeaveMessage('Vui lòng nhập lý do nghỉ.', false); return; }
    setLeaveMessage('Đang lưu nhân viên nghỉ...', true);
    const doneBusy = beginBusy('Đang lưu nhân viên nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { setLeaveMessage(res.reason || 'Không lưu được nhân viên nghỉ.', false); return; }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        document.getElementById('leaveReason').value = '';
        document.getElementById('leaveHours').value = '8';
        renderEmployeeLeaveInfo(res);
        setLeaveMessage('Đã lưu nhân viên nghỉ ngày ' + res.ngay + '.', true);
        if (document.getElementById('ngay').value === res.ngay && hasPerm('canManageWorkEntry')) reloadEmployees(true);
        if (hasPerm('canViewOverview')) loadManagerDashboard(true);
      })
      .withFailureHandler(err => { doneBusy(); setLeaveMessage(err.message, false); })
      .apiSaveEmployeeLeave(payload);
  }


  function editEmployeeLeave(index) {
    const row = (state.employeeLeaves || [])[index];
    if (!row) return;
    const oldHours = Number(row.soGioNghi || row.gioNghi || 8);
    const hourText = prompt('Nhập số giờ nghỉ mới cho ' + row.soThe + ' (1-8h):', String(oldHours));
    if (hourText === null) return;
    const soGioNghi = Number(String(hourText).trim());
    if (!soGioNghi || isNaN(soGioNghi) || soGioNghi < 1 || soGioNghi > 8) {
      setLeaveMessage('Số giờ nghỉ phải từ 1 đến 8.', false);
      return;
    }
    const lyDo = prompt('Nhập lý do/nội dung nghỉ:', row.lyDo || '');
    if (lyDo === null) return;
    if (!lyDo.trim()) {
      setLeaveMessage('Vui lòng nhập lý do nghỉ.', false);
      return;
    }
    setLeaveMessage('Đang sửa dòng nghỉ...', true);
    const doneBusy = beginBusy('Đang sửa dòng nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { setLeaveMessage(res.reason || 'Không sửa được dòng nghỉ.', false); return; }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        renderEmployeeLeaveInfo(res);
        setLeaveMessage('Đã sửa dòng nghỉ.', true);
        if (document.getElementById('ngay').value === res.ngay && hasPerm('canManageWorkEntry')) reloadEmployees(true);
        if (hasPerm('canViewOverview')) loadManagerDashboard(true);
      })
      .withFailureHandler(err => { doneBusy(); setLeaveMessage(err.message, false); })
      .apiUpdateEmployeeLeave(authPayload({ leaveId: row.id, soGioNghi, lyDo }));
  }

  function cancelEmployeeLeave(index) {
    const row = (state.employeeLeaves || [])[index];
    if (!row) return;
    const reason = prompt('Nhập lý do hủy dòng nghỉ của ' + row.soThe + ':');

    setLeaveMessage('Đang hủy dòng nghỉ...', true);
    const doneBusy = beginBusy('Đang hủy dòng nghỉ...');
    google.script.run
      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { setLeaveMessage(res.reason || 'Không hủy được dòng nghỉ.', false); return; }
        state.leaveEmployees = res.employees || [];
        state.employeeLeaves = res.leaves || [];
        renderEmployeeLeaveInfo(res);
        setLeaveMessage('Đã hủy dòng nghỉ.', true);
        if (document.getElementById('ngay').value === res.ngay && hasPerm('canManageWorkEntry')) reloadEmployees(true);
        if (hasPerm('canViewOverview')) loadManagerDashboard(true);

    if (!hasPerm('canViewOverview')) return;
    const payload = authPayload({ ngay: document.getElementById('dashboardDate').value || document.getElementById('ngay').value || todayText() });
    if (!payload.ngay) { setDashboardMessage('Vui lòng chọn ngày tổng quan.', false); return; }
    if (!silent) setSectionCollapsed('dashboardBox', false);
    if (!silent) setDashboardMessage('Đang cập nhật tổng quan...', true);
    renderManagerDashboard(null, silent);
    const doneBusy = silent ? null : beginBusy('Đang cập nhật tổng quan...');
    const dashboardTimer = setTimeout(() => { if (!silent) setDashboardMessage('Tải dashboard quá lâu. Kiểm tra Apps Script > Executions hoặc thử tải lại.', false); }, 20000);
    google.script.run
      .withSuccessHandler(res => {
        clearTimeout(dashboardTimer);
        if (doneBusy) doneBusy();
        if (!res.ok) { setDashboardMessage(res.reason || 'Không tải được dashboard.', false); return; }
        state.dashboard = res.dashboard || null;
        renderManagerDashboard(state.dashboard);
        if (!silent) setDashboardMessage('Đã cập nhật tổng quan ngày ' + state.dashboard.ngay + '.', true);
        else setDashboardMessage('', true);
      })
      .withFailureHandler(err => { clearTimeout(dashboardTimer); if (doneBusy) doneBusy(); setDashboardMessage(err.message, false); })
      .apiGetManagerDashboard(payload);
  }

    const confirmedText = dashboard.confirmed ? `Xác nhận bởi ${escapeHtml(dashboard.xacNhanBoi || '')} · ${escapeHtml(dashboard.thoiGianXacNhan || '')}` : (dashboard.thoiGianMoLai ? `Mở lại bởi ${escapeHtml(dashboard.moLaiBoi || '')} · ${escapeHtml(dashboard.thoiGianMoLai || '')}` : 'Ngày còn đang nhập');
    box.innerHTML = `
      <div class="dashboard-status ${statusClass}"><div><b>Ngày ${escapeHtml(dashboard.ngay)}</b><span>${escapeHtml(confirmedText)}</span></div><strong>${statusText}</strong></div>

        <div class="dash-card"><span>Đã phân công</span><b>${dashboard.assignedEmployees || 0}</b></div>
        <div class="dash-card"><span>Tổng giờ</span><b>${dashboard.totalHours || 0}h</b></div>
        <div class="dash-card ok"><span>Đủ 8h</span><b>${dashboard.okEmployees || 0}</b></div>
        <div class="dash-card warn-card"><span>Thiếu giờ</span><b>${dashboard.shortEmployees || 0}</b></div>
        <div class="dash-card danger-card"><span>Vượt 8h</span><b>${dashboard.overEmployees || 0}</b></div>
        <div class="dash-card leave-card"><span>Nghỉ</span><b>${dashboard.leaveEmployees || 0}</b></div>

      <p class="dashboard-updated">Cập nhật: ${escapeHtml(dashboard.updatedAt || '')}</p>`;

      if (sectionId === 'manageBox' && document.getElementById('manageDate')) document.getElementById('manageDate').value = dashboardDate;
      if (sectionId === 'dailyBox' && document.getElementById('dailyDate')) document.getElementById('dailyDate').value = dashboardDate;
      if (sectionId === 'reportBox') {
        if (document.getElementById('reportFromDate')) document.getElementById('reportFromDate').value = dashboardDate;
        if (document.getElementById('reportToDate')) document.getElementById('reportToDate').value = dashboardDate;
      }

    setActiveShellTab(sectionId);
    const nav = document.getElementById('mobileNavShell');
    if (nav) nav.scrollIntoView({ behavior: 'smooth', block: 'start' });

  function loadDailyConfirmInfo() {
    if (!hasPerm('canConfirmDay')) { setDailyMessage('Chỉ QL được kiểm tra/chốt ngày.', false); return; }
    const payload = authPayload({ ngay: document.getElementById('dailyDate').value });
    if (!payload.ngay) { setDailyMessage('Vui lòng chọn ngày cần kiểm tra.', false); return; }
    setSectionCollapsed('dailyBox', false);
    setDailyMessage('Đang kiểm tra tổng giờ trong ngày...', true);
    renderDailySummary(null);
    const doneBusy = beginBusy('Đang kiểm tra tổng giờ trong ngày...');

      .withSuccessHandler(res => {
        doneBusy();
        if (!res.ok) { setDailyMessage(res.reason || 'Không kiểm tra được ngày.', false); return; }
        state.dailyStatus = res.status;
        state.dailySummary = res.summary;
        renderDailySummary(res);
        setDailyMessage('Đã kiểm tra ngày ' + res.summary.ngay + '.', true);
      })
      .withFailureHandler(err => { doneBusy(); setDailyMessage(err.message, false); })
      .apiGetDailyConfirmInfo(payload);

  function renderDailySummary(res) {
    const box = document.getElementById('dailySummary');
    if (!box) return;
    const confirmBtn = document.getElementById('dailyConfirmBtn');
    const reopenBtn = document.getElementById('dailyReopenBtn');
    if (!res || !res.summary) {
      box.innerHTML = '<p class="empty-note">Bấm kiểm tra để xem tổng giờ theo từng nhân viên trong ngày.</p>';
      if (confirmBtn) confirmBtn.disabled = true;
      if (reopenBtn) reopenBtn.disabled = true;
      return;
    }
    const status = res.status || {};
    const summary = res.summary || {};
    const counts = summary.counts || { short: 0, ok: 0, over: 0, total: 0 };
    const confirmed = status.trangThai === 'CONFIRMED';
    if (confirmBtn) confirmBtn.disabled = confirmed || counts.over > 0;
    if (reopenBtn) reopenBtn.disabled = !confirmed;
    const employeeHtml = (summary.employees || []).map(e => {
      const cls = e.statusCode === 'OVER' ? 'over-hours' : (e.isLeave ? 'leave-hours' : (e.statusCode === 'OK' ? 'ok-hours' : 'short-hours'));
      const detail = e.chiTiet ? escapeHtml(e.chiTiet) : 'Chưa có công việc trong ngày';
      return `<div class="daily-employee ${cls}"><div><b>${escapeHtml(e.soThe)}${e.hoTen ? ' - ' + escapeHtml(e.hoTen) : ''}</b><div class="daily-detail">${detail}</div></div><div class="daily-hours"><b class="compact">${escapeHtml(compactDailyHourText(e))}</b></div></div>`;
    }).join('');
    box.innerHTML = `
      <div class="daily-status-card ${confirmed ? 'confirmed' : 'draft'}"><div><b>Trạng thái ngày ${escapeHtml(summary.ngay)}</b></div><div>${escapeHtml(status.trangThaiText || '')}</div></div>
      <div class="daily-counts"><span>Phiếu active: <b>${summary.activeEntries || 0}</b></span><span>Phiếu hủy: <b>${summary.deletedEntries || 0}</b></span><span>Đủ 8h: <b>${counts.ok || 0}</b></span><span>Chưa đủ: <b>${counts.short || 0}</b></span><span>Vượt: <b>${counts.over || 0}</b></span><span>Nghỉ: <b>${counts.leave || 0}</b></span></div>
      ${counts.over > 0 ? '<p class="error">Còn nhân viên vượt 8h. Phải sửa dữ liệu trước khi xác nhận/chốt ngày.</p>' : ''}
      ${confirmed ? '<p class="warn">Ngày đã xác nhận: hệ thống chặn lưu phiếu mới, sửa phiếu, hủy phiếu và thay đổi nghỉ cho đến khi QL mở lại ngày.</p>' : ''}
      <div class="daily-employee-list">${employeeHtml || '<p class="empty-note">Không có nhân viên để hiển thị.</p>'}</div>`;
  }

  function confirmDaily() {
    if (!hasPerm('canConfirmDay')) { setDailyMessage('Chỉ QL được xác nhận ngày.', false); return; }
    const payload = authPayload({ ngay: document.getElementById('dailyDate').value, ghiChu: document.getElementById('dailyNote').value });
    if (!payload.ngay) { setDailyMessage('Vui lòng chọn ngày cần xác nhận.', false); return; }
    if (!confirm('Xác nhận/chốt ngày ' + payload.ngay + '? Sau khi chốt, hệ thống sẽ chặn lưu/sửa/hủy phiếu và thay đổi nghỉ của ngày này.')) return;
    setDailyMessage('Đang xác nhận ngày...', true);
    const doneBusy = beginBusy('Đang xác nhận/chốt ngày...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setDailyMessage(res.reason || 'Không xác nhận được ngày.', false); return; } state.dailyStatus = res.status; state.dailySummary = res.summary; renderDailySummary(res); setDailyMessage('Đã xác nhận/chốt ngày ' + res.summary.ngay + '.', true); if (hasPerm('canViewOverview')) loadManagerDashboard(true); })
      .withFailureHandler(err => { doneBusy(); setDailyMessage(err.message, false); })
      .apiConfirmDaily(payload);
  }

  function reopenDaily() {
    if (!hasPerm('canConfirmDay')) { setDailyMessage('Chỉ QL được mở lại ngày.', false); return; }
    const payload = authPayload({ ngay: document.getElementById('dailyDate').value, reason: document.getElementById('dailyNote').value });
    if (!payload.ngay) { setDailyMessage('Vui lòng chọn ngày cần mở lại.', false); return; }
    if (!payload.reason.trim()) { setDailyMessage('Vui lòng nhập lý do mở lại ngày.', false); return; }
    if (!confirm('Mở lại ngày ' + payload.ngay + ' để cho phép sửa/lưu/hủy phiếu và thay đổi nghỉ?')) return;
    setDailyMessage('Đang mở lại ngày...', true);
    const doneBusy = beginBusy('Đang mở lại ngày...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setDailyMessage(res.reason || 'Không mở lại được ngày.', false); return; } state.dailyStatus = res.status; state.dailySummary = res.summary; renderDailySummary(res); setDailyMessage('Đã mở lại ngày ' + res.summary.ngay + '.', true); if (hasPerm('canViewOverview')) loadManagerDashboard(true); })
      .withFailureHandler(err => { doneBusy(); setDailyMessage(err.message, false); })
      .apiReopenDaily(payload);
  }

  function generateReports() {
    if (!hasPerm('canReport')) { setReportMessage('Chỉ QL/NS được tạo báo cáo.', false); return; }
    const payload = authPayload({ fromDate: document.getElementById('reportFromDate').value, toDate: document.getElementById('reportToDate').value });
    if (!payload.fromDate || !payload.toDate) { setReportMessage('Vui lòng chọn đủ từ ngày và đến ngày.', false); return; }
    setSectionCollapsed('reportBox', false);
    setReportMessage('Đang tạo báo cáo...', true);
    const doneBusy = beginBusy('Đang tạo báo cáo...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setReportMessage(res.reason || 'Không tạo được báo cáo.', false); return; } setReportMessage(`Đã tạo báo cáo ${res.fromDate} → ${res.toDate}. Nhân viên: ${res.employeeRows} dòng, hạng mục: ${res.jobRows} dòng.`, true); })
      .withFailureHandler(err => { doneBusy(); setReportMessage(err.message, false); })
      .apiGenerateReports(payload);
  }

  function loadWorkEntries() {
    if (!hasPerm('canManageWorkEntry')) { setManageMessage('Chỉ QL được quản lý phiếu.', false); return; }
    const payload = authPayload({ ngay: document.getElementById('manageDate').value });
    if (!payload.ngay) { setManageMessage('Vui lòng chọn ngày cần xem phiếu.', false); return; }
    setSectionCollapsed('manageBox', false);
    setManageMessage('Đang tải danh sách phiếu...', true);
    const doneBusy = beginBusy('Đang tải danh sách phiếu...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setManageMessage(res.reason || 'Không tải được danh sách phiếu.', false); return; } state.entries = res.entries || []; cancelEntryEdit(); renderEntryList(); setManageMessage(`Đã tải ${state.entries.length} phiếu ngày ${res.ngay}.`, true); })
      .withFailureHandler(err => { doneBusy(); setManageMessage(err.message, false); })
      .apiListWorkEntries(payload);
  }

  function renderEntryList() {
    const box = document.getElementById('entryList');
    if (!box) return;
    if (!state.entries.length) { box.innerHTML = '<p class="empty-note">Không có phiếu trong ngày đã chọn.</p>'; return; }
    box.innerHTML = state.entries.map(e => {
      const deleted = e.trangThai === 'DELETED';
      const statusText = deleted ? 'ĐÃ HỦY' : 'ACTIVE';
      const actionHtml = deleted ? `<div class="entry-meta">Lý do hủy: ${escapeHtml(e.lyDoHuy || '')}</div>` : `<div class="entry-actions"><button class="edit-entry" type="button" onclick="editEntry('${escapeHtml(e.phieuId)}')">Sửa phiếu</button><button class="delete-entry" type="button" onclick="deleteEntry('${escapeHtml(e.phieuId)}')">Hủy phiếu</button></div>`;
      return `<div class="entry-card ${deleted ? 'deleted' : ''}"><div class="entry-head"><span>${escapeHtml(e.phieuId)}</span><span>${statusText}</span></div><div class="entry-meta"><b>${escapeHtml(e.hangMuc)}</b><br>Nội dung: ${escapeHtml(e.noiDungCongViec)}<br>Nhân sự: ${escapeHtml(e.nhanSuText || '')}<br>Tổng: ${e.soNhanSu || 0} người · ${e.tongGio || 0}h<br>Người nhập: ${escapeHtml(e.nguoiNhap)} · Thiết bị: ${escapeHtml(e.deviceId)}</div>${actionHtml}</div>`;
    }).join('');
  }

  function buildEditEmployeeOptions(selectedKey) {
    const selected = String(selectedKey || '');
    const found = state.editEmployees.some(e => String(employeeOptionValue(e)) === selected || String(e.soThe) === selected);
    let list = state.editEmployees.slice();
    if (selected && !found) list.unshift({ nhanVienID: selected.indexOf('EMP') === 0 ? selected : '', soThe: selected.indexOf('EMP') === 0 ? '' : selected, hoTen: '', conLai: 8 });
    return '<option value="">-- Số thẻ --</option>' + list.map(e => {
      const value = employeeOptionValue(e);
      const sel = String(value) === selected || String(e.soThe) === selected ? ' selected' : '';
      return `<option value="${escapeHtml(value)}" data-nhanvienid="${escapeHtml(e.nhanVienID || '')}" data-sothe="${escapeHtml(e.soThe || '')}" data-conlai="${e.conLai}"${sel}>${escapeHtml(e.soThe || value)} · còn ${e.conLai || 8}h${Number(e.gioNghi || 0) > 0 ? ' · nghỉ ' + e.gioNghi + 'h' : ''}</option>`;
    }).join('');
  }

  function buildEditHourOptions(max, selectedHour) {
    let html = '<option value="">Giờ</option>';
    const limit = Math.max(1, Math.min(Number(max || 8), 8));
    for (let i = 1; i <= limit; i++) html += `<option value="${i}"${Number(selectedHour) === i ? ' selected' : ''}>${i}h</option>`;
    return html;
  }

  function addEditEmployeeRow(nhanVienIDOrSoThe, soGio) {
    const wrap = document.getElementById('editEmployeeRows');
    const row = document.createElement('div');
    row.className = 'edit-emp-row';
    row.innerHTML = `<select class="edit-emp" name="editSoThe">${buildEditEmployeeOptions(nhanVienIDOrSoThe)}</select><select class="edit-hours" name="editSoGio">${buildEditHourOptions(8, soGio)}</select><button type="button">×</button>`;
    const emp = row.querySelector('.edit-emp');
    const hours = row.querySelector('.edit-hours');
    emp.onchange = () => { const opt = emp.options[emp.selectedIndex]; hours.innerHTML = buildEditHourOptions(Number(opt.dataset.conlai || 8), ''); };
    const opt = emp.options[emp.selectedIndex];
    if (opt && opt.value) hours.innerHTML = buildEditHourOptions(Number(opt.dataset.conlai || 8), soGio);
    row.querySelector('button').onclick = () => row.remove();
    wrap.appendChild(row);
  }

  function editEntry(phieuId) {
    if (!hasPerm('canManageWorkEntry')) { setManageMessage('Chỉ QL được sửa phiếu.', false); return; }
    setManageMessage('Đang tải chi tiết phiếu...', true);
    setEditMessage('', true);
    const doneBusy = beginBusy('Đang tải chi tiết phiếu...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setManageMessage(res.reason || 'Không tải được chi tiết phiếu.', false); return; } state.editingEntry = res.entry; state.editEmployees = res.employees || []; renderEntryEditForm(res.entry); setManageMessage('Đã tải chi tiết phiếu: ' + res.entry.phieuId, true); })
      .withFailureHandler(err => { doneBusy(); setManageMessage(err.message, false); })
      .apiGetWorkEntryDetail(authPayload({ phieuId }));
  }

  function renderEntryEditForm(entry) {
    const box = document.getElementById('entryEditBox');
    if (!box) return;
    setSectionCollapsed('manageBox', false);
    box.classList.remove('hidden');
    document.getElementById('editPhieuId').value = entry.phieuId || '';
    document.getElementById('editHangMuc').value = entry.hangMuc || '';
    document.getElementById('editNoiDungCongViec').value = entry.noiDungCongViec || '';
    document.getElementById('editReason').value = '';
    document.getElementById('editEmployeeRows').innerHTML = '';
    (entry.details || []).forEach(d => addEditEmployeeRow(d.nhanVienID || d.soThe, d.soGio));
    if (!(entry.details || []).length) addEditEmployeeRow();
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelEntryEdit() {
    const box = document.getElementById('entryEditBox');
    if (box) box.classList.add('hidden');
    state.editingEntry = null;
    state.editEmployees = [];
    setEditMessage('', true);
  }

  function collectEditPayload() {
    const rows = Array.from(document.querySelectorAll('#editEmployeeRows .edit-emp-row'));
    const nhanSu = [];
    const seen = {};
    rows.forEach(row => {
      const sel = row.querySelector('select[name="editSoThe"]');
      const opt = sel.options[sel.selectedIndex];
      const nhanVienID = opt ? (opt.dataset.nhanvienid || '') : '';
      const soThe = opt ? (opt.dataset.sothe || '') : '';
      const key = nhanVienID || soThe || sel.value;
      const soGio = Number(row.querySelector('select[name="editSoGio"]').value);
      if (!key && !soGio) return;
      if (!key || !soGio) throw new Error('Có dòng nhân viên sửa chưa chọn đủ số thẻ và số giờ.');
      if (seen[key]) throw new Error(`Nhân viên ${soThe || key} bị chọn trùng trong phiếu sửa. Hãy gộp giờ vào một dòng.`);
      seen[key] = true;
      nhanSu.push({ nhanVienID, soThe, soGio });
    });
    if (!nhanSu.length) throw new Error('Phiếu sửa phải có ít nhất 1 nhân viên.');
    const payload = authPayload({
      phieuId: document.getElementById('editPhieuId').value,
      noiDungCongViec: document.getElementById('editNoiDungCongViec').value,
      reason: document.getElementById('editReason').value,
      nhanSu,
      nhanSuJson: JSON.stringify(nhanSu)
    });
    if (!payload.reason.trim()) throw new Error('Vui lòng nhập lý do sửa phiếu.');
    return payload;
  }

  function saveEntryEdit() {
    let payload;
    try { payload = collectEditPayload(); } catch (err) { setEditMessage(err.message, false); return; }
    if (!confirm('Xác nhận lưu sửa phiếu ' + payload.phieuId + '?')) return;
    setEditMessage('Đang lưu sửa phiếu...', true);
    const doneBusy = beginBusy('Đang lưu sửa phiếu...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setEditMessage(res.reason || 'Không sửa được phiếu.', false); return; } setEditMessage('Đã sửa phiếu: ' + res.phieuId + ' · ' + res.updatedNhanSu + ' nhân viên', true); reloadEmployees(true); loadWorkEntries(); if (hasPerm('canViewOverview')) loadManagerDashboard(true); })
      .withFailureHandler(err => { doneBusy(); setEditMessage(err.message, false); })
      .apiUpdateWorkEntry(payload);
  }

  function deleteEntry(phieuId) {
    const reason = prompt('Nhập lý do hủy phiếu ' + phieuId + ':');
    if (reason === null) return;
    if (!reason.trim()) { setManageMessage('Lý do hủy phiếu không được trống.', false); return; }
    if (!confirm('Xác nhận hủy phiếu ' + phieuId + '? Dữ liệu sẽ không bị xóa vật lý, nhưng báo cáo và tính giờ sẽ bỏ qua phiếu này.')) return;
    setManageMessage('Đang hủy phiếu...', true);
    const doneBusy = beginBusy('Đang hủy phiếu...');
    google.script.run
      .withSuccessHandler(res => { doneBusy(); if (!res.ok) { setManageMessage(res.reason || 'Không hủy được phiếu.', false); return; } setManageMessage('Đã hủy phiếu: ' + res.phieuId, true); reloadEmployees(true); loadWorkEntries(); if (hasPerm('canViewOverview')) loadManagerDashboard(true); })
      .withFailureHandler(err => { doneBusy(); setManageMessage(err.message, false); })
      .apiSoftDeleteWorkEntry(authPayload({ phieuId, reason }));
  }

  window.addEventListener('load', init);
</script>
