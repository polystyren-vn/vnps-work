<style>
  :root {
    --primary: #0f766e;
    --primary-dark: #134e4a;
    --blue: #2563eb;
    --bg: #f1f5f9;
    --card: #ffffff;
    --line: #cbd5e1;
    --muted: #64748b;
    --text: #0f172a;
    --danger: #b91c1c;
    --danger-bg: #fee2e2;
    --warning: #b45309;
    --ok-bg: #ecfdf5;
    --ok-line: #a7f3d0;
    --shadow: 0 1px 3px rgba(15, 23, 42, .10);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 17px;
    line-height: 1.45;
  }

  .app {
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    padding: 10px 10px 28px;
  }

  .header {
    background: var(--primary-dark);
    color: #fff;
    padding: 14px;
    border-radius: 14px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    box-shadow: var(--shadow);
  }
  .brand-block { min-width: 0; }
  h1 { margin: 0 0 4px; font-size: 23px; letter-spacing: .2px; line-height: 1.15; }
  h2 { margin: 0 0 10px; font-size: 21px; }
  h3 { font-size: 18px; }
  #status { margin: 0; opacity: .9; }
  .version {
    flex: 0 0 auto;
    font-size: 12px;
    opacity: .92;
    text-align: right;
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    white-space: nowrap;
  }

  .card, .section-card {
    margin-top: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card { padding: 14px; }
  .hidden { display: none !important; }

  .identity-card { padding: 10px; }
  .userbar {
    background: var(--ok-bg);
    color: #065f46;
    border: 1px solid var(--ok-line);
    padding: 10px;
    border-radius: 12px;
  }
  .identity-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .identity-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .identity-chip {
    background: #fff;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 8px;
    min-width: 0;
  }
  .chip-label {
    display: block;
    color: #047857;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .chip-value {
    display: block;
    color: #064e3b;
    font-size: 15px;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  .section-toggle {
    width: 100%;
    border: 0;
    border-radius: 0;
    padding: 14px;
    background: #ffffff;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    text-align: left;
  }
  .section-toggle:active { background: #f8fafc; }
  .section-title {
    display: block;
    font-size: 19px;
    font-weight: 800;
    line-height: 1.2;
  }
  .section-subtitle {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }
  .section-state {
    flex: 0 0 auto;
    background: #e2e8f0;
    color: #334155;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 800;
  }
  .section-body {
    padding: 0 14px 14px;
    border-top: 1px solid #e2e8f0;
  }
  .section-card.collapsed .section-body { display: none; }
  .section-card.collapsed .section-state { background: #ccfbf1; color: #0f766e; }

  .hint {
    background: var(--ok-bg);
    border: 1px solid var(--ok-line);
    color: #065f46;
    padding: 10px;
    border-radius: 12px;
    margin: 12px 0;
  }
  .pending {
    border-color: #f59e0b;
    background: #fffbeb;
  }

  label {
    display: block;
    font-weight: 800;
    margin-top: 14px;
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    font-size: 18px;
    min-height: 48px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    color: var(--text);
  }
  input:focus, select:focus, textarea:focus, button:focus {
    outline: 3px solid rgba(15,118,110,.22);
    outline-offset: 2px;
  }
  input[readonly] {
    background: #e2e8f0;
    color: #334155;
    font-weight: bold;
  }
  textarea { resize: vertical; }

  .row-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .row-title h3 { margin: 0; }

  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 14px;
    min-height: 48px;
    font-size: 17px;
    font-weight: 800;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    touch-action: manipulation;
  }
  .small-action {
    width: auto;
    white-space: nowrap;
    padding-left: 14px;
    padding-right: 14px;
  }
  .save {
    width: 100%;
    margin-top: 18px;
    font-size: 20px;
    padding: 15px;
  }
  .report, .manage, .daily, .dashboard {
    width: 100%;
    margin-top: 18px;
    font-size: 19px;
    padding: 14px;
    background: var(--blue);
  }
  .secondary { background: #64748b; }

  .emp-row, .edit-emp-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 112px 50px;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .emp-row button, .edit-emp-row button {
    background: #ef4444;
    padding: 12px 0;
  }

  .dashboard-content { margin-top: 12px; }
  .dashboard-status {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    background: #f8fafc;
  }
  .dashboard-status span {
    display: block;
    margin-top: 4px;
    font-size: 13px;
    color: #475569;
  }
  .dashboard-status strong {
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 13px;
    white-space: nowrap;
  }
  .dashboard-status.ok-level { border-color: #86efac; background: #f0fdf4; }
  .dashboard-status.ok-level strong { background: #dcfce7; color: #166534; }
  .dashboard-status.warn-level { border-color: #fde68a; background: #fffbeb; }
  .dashboard-status.warn-level strong { background: #fef3c7; color: #92400e; }
  .dashboard-status.danger { border-color: #fecaca; background: #fef2f2; }
  .dashboard-status.danger strong { background: #fee2e2; color: #991b1b; }
  .dashboard-status.locked { border-color: #bfdbfe; background: #eff6ff; }
  .dashboard-status.locked strong { background: #dbeafe; color: #1e40af; }
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }
  .dash-card {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    background: #fff;
    min-width: 0;
  }
  .dash-card span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }
  .dash-card b {
    display: block;
    margin-top: 3px;
    font-size: 24px;
    line-height: 1.1;
  }
  .dash-card.ok { border-color: #86efac; background: #f0fdf4; }
  .dash-card.warn-card { border-color: #fde68a; background: #fffbeb; }
  .dash-card.danger-card { border-color: #fecaca; background: #fef2f2; }
  .dashboard-alerts {
    margin-top: 10px;
    border: 1px solid #bae6fd;
    background: #f0f9ff;
    color: #075985;
    border-radius: 12px;
    padding: 10px 12px;
  }
  .dashboard-alerts ul {
    margin: 6px 0 0 18px;
    padding: 0;
  }
  .dashboard-alerts li { margin-top: 4px; }
  .dashboard-updated {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }
  .quick-actions {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .quick-actions button {
    background: #0f766e;
    font-size: 15px;
    min-height: 46px;
  }

  .entry-list { margin-top: 12px; }
  .entry-card {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    background: #fff;
  }
  .entry-card.deleted {
    background: #f8fafc;
    opacity: .78;
  }
  .entry-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-weight: 800;
  }
  .entry-meta {
    margin-top: 6px;
    color: #475569;
    font-size: 15px;
    line-height: 1.5;
  }
  .entry-actions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .entry-actions button { flex: 1 1 150px; }
  .delete-entry { background: #dc2626; }
  .edit-entry { background: var(--blue); }
  button:disabled {
    background: #94a3b8 !important;
    cursor: not-allowed;
    opacity: .72;
  }

  .daily-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .daily-actions .save { margin-top: 0; }
  .daily-summary { margin-top: 12px; }
  .daily-status-card {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    background: #f8fafc;
    margin-top: 10px;
  }
  .daily-status-card.confirmed {
    border-color: #86efac;
    background: #f0fdf4;
    color: #14532d;
  }
  .daily-status-card.draft {
    border-color: #fde68a;
    background: #fffbeb;
    color: #78350f;
  }
  .daily-status-card small { display: block; margin-top: 4px; }
  .daily-counts {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }
  .daily-counts span {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px;
    font-size: 14px;
  }
  .daily-employee-list { margin-top: 10px; }
  .daily-employee {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 88px;
    gap: 8px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    margin-top: 8px;
    background: #fff;
  }
  .daily-employee.ok-hours { border-color: #86efac; background: #f0fdf4; }
  .daily-employee.short-hours { border-color: #fde68a; background: #fffbeb; }
  .daily-employee.over-hours { border-color: #fecaca; background: #fef2f2; }
  .daily-detail {
    margin-top: 4px;
    color: #475569;
    font-size: 14px;
    overflow-wrap: anywhere;
  }
  .daily-hours {
    text-align: right;
    align-self: center;
  }
  .daily-hours b, .daily-hours span { display: block; }
  .daily-hours span { font-size: 13px; color: #475569; }


  .device-list { margin-top: 10px; }
  .device-card {
    border: 1px solid #bfdbfe;
    background: #eff6ff;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
  }
  .device-card label { margin-top: 10px; }
  .device-card button { margin-top: 8px; width: 100%; }

  .entry-edit {
    margin-top: 14px;
    border: 1px solid #99f6e4;
    background: #f0fdfa;
    border-radius: 12px;
    padding: 12px;
  }
  .edit-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .message-line {
    min-height: 24px;
    margin: 10px 0 0;
    font-weight: 800;
    overflow-wrap: anywhere;
  }
  .error {
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .ok {
    color: var(--primary);
    background: var(--ok-bg);
    border: 1px solid var(--ok-line);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .warn {
    color: var(--warning);
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 8px 10px;
  }

  @media (max-width: 520px) {
    body { font-size: 16px; }
    .app { padding: 8px 8px 24px; }
    .header {
      border-radius: 12px;
      padding: 12px;
      flex-direction: column;
      align-items: stretch;
    }
    h1 { font-size: 21px; }
    .version {
      align-self: flex-start;
      text-align: left;
    }
    .identity-grid { grid-template-columns: 1fr; }
    .section-toggle { padding: 12px; }
    .section-title { font-size: 18px; }
    .section-subtitle { font-size: 12px; }
    .section-state { padding: 5px 8px; }
    .section-body { padding: 0 12px 12px; }
    input, select, textarea { font-size: 17px; padding: 11px; }
    .emp-row, .edit-emp-row { grid-template-columns: minmax(0, 1fr) 88px 44px; gap: 6px; }
    .edit-actions, .daily-actions { grid-template-columns: 1fr; }
    .entry-actions { display: grid; grid-template-columns: 1fr; }
    .daily-counts { grid-template-columns: 1fr; }
    .dashboard-status { align-items: flex-start; flex-direction: column; }
    .dashboard-grid, .quick-actions { grid-template-columns: 1fr; }
    .daily-employee { grid-template-columns: 1fr; }
    .daily-hours { text-align: left; }
    .small-action { padding-left: 10px; padding-right: 10px; }
  }

  @media (max-width: 360px) {
    .section-toggle { gap: 8px; }
    .emp-row, .edit-emp-row { grid-template-columns: 1fr; }
    .emp-row button, .edit-emp-row button { width: 100%; }
  }
</style>

<style>
  /* V0.10 - Nhân viên nghỉ */
  .leave-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .leave-list { margin-top: 10px; }
  .leave-card-item {
    border: 1px solid #fed7aa;
    background: #fff7ed;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
  }
  .daily-employee.leave-hours {
    background: #eff6ff;
    border-color: #bfdbfe;
  }
  .daily-employee.leave-hours .daily-hours {
    color: #1d4ed8;
  }
  .dash-card.leave-card {
    background: #eff6ff;
    border-color: #bfdbfe;
  }
  .dash-card.leave-card b { color: #1d4ed8; }
  @media (max-width: 520px) {
    .leave-actions { grid-template-columns: 1fr; }
  }
</style>
