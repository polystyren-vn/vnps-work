<style>
  :root {
    --primary: #0f766e;
    --dark: #134e4a;
    --bg: #f1f5f9;
    --card: #ffffff;
    --line: #cbd5e1;
    --danger: #b91c1c;
    --warning: #b45309;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: #0f172a;
    font-size: 17px;
  }
  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px;
  }
  .header {
    background: var(--dark);
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
  }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .version { font-size: 12px; opacity: .8; text-align: right; }
  .card {

    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 1px 3px rgba(15,23,42,.1);
  }
  .hidden { display: none; }
  .hint {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    color: #065f46;
    padding: 10px;
    border-radius: 10px;
  }
  .pending {
    border-color: #f59e0b;
    background: #fffbeb;
  }

    margin-top: 14px;
    margin-bottom: 6px;

    font-size: 18px;
    padding: 12px;

  }
  input[readonly] {
    background: #e2e8f0;
    color: #334155;
    font-weight: bold;
  }
  textarea { resize: vertical; }

    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
    padding: 10px;
    border-radius: 10px;

    justify-content: space-between;

    margin-top: 12px;

    border-radius: 10px;
    padding: 12px 14px;
    font-size: 17px;
    font-weight: bold;
    background: var(--primary);
    color: #fff;
  }

    margin-top: 18px;
    font-size: 20px;
    padding: 15px;
  }

    border-top: 2px solid var(--line);

    padding: 14px;

    border-radius: 12px;

  }

    justify-content: space-between;

  }
